<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <title>Trail Map</title>

    <!-- Open Graph + Twitter Card metadata for rich share-link previews.
         Values substituted at build time (copy_templates). Always-on,
         no config gate — these are harmless metadata that benefit
         search engines as well as the Share button (B.3) flow. URLs
         are relative; OG-tag scrapers (Facebook, WhatsApp, Telegram,
         iMessage, Twitter) resolve them against the page URL they
         fetched, and default og:url to the fetched URL when omitted —
         so no canonical-URL config is needed. -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="__OG_TITLE__">
    <meta property="og:description" content="__OG_DESCRIPTION__">
    <meta property="og:image" content="icons/android-chrome-512x512.png">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="__OG_TITLE__">
    <meta name="twitter:description" content="__OG_DESCRIPTION__">
    <meta name="twitter:image" content="icons/android-chrome-512x512.png">

    <!-- Icons start -->
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="manifest" href="icons/site.webmanifest">
    <link rel="mask-icon" href="icons/safari-pinned-tab.svg" color="#5bbad5">
    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="theme-color" content="#ffffff">
    <!-- Icons end -->

    <!-- Colour-scheme bootstrap: runs synchronously BEFORE any
         stylesheet so first paint already has the right
         data-color-scheme on <html> and CSS vars resolve correctly
         (no light→dark FOUC for riders whose preference is dark).
         Build pipeline substitutes the actual script with the
         per-map slug + curator default scheme baked in. Reads LS
         first, falls back to default, resolves "auto" via
         prefers-color-scheme. -->
    __COLOR_SCHEME_BOOTSTRAP__

    <!-- Vendor libraries (bundled locally for offline support) -->
    <link rel="stylesheet" href="vendor/maplibre-gl.css">
    <script src="vendor/maplibre-gl.js"></script>
    <script src="vendor/pmtiles.js"></script>
    <script src="vendor/basemaps.js"></script>

    <!-- App styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map"></div>

    <!-- Brand: top-left trail-system identity. The build pipeline:
         - Replaces __BRAND_TITLE__ with the map's title text
         - Strips the <img> when neither `logo:` nor `icon:` is configured
         - Renames `logo.webp` → `logo.svg` when the source is vector
         When the img is shown, the title span is visually hidden via
         CSS but stays in the DOM for screen readers + as a fallback if
         the image fails to load. -->
    <div id="brand">
        <!-- Brand img start -->
        <img src="logo.webp" alt="__BRAND_TITLE__" id="brand-img">
        <!-- Brand img end -->
        <span id="brand-title">__BRAND_TITLE__</span>
    </div>

    <!-- Off-screen location indicator (managed by app.js) -->
    <div id="off-screen-indicator" class="off-screen-indicator hidden" aria-hidden="true"></div>

    <!-- Highlight chip — floating at top of map when a route or trail is highlighted.
         The .highlight-chip-text wrapper holds the primary label and an optional
         second-line note (used by the POI force-show flow to say "hidden in Options"
         when a search highlight is showing markers whose layer toggle is off). The
         note's .hidden class is toggled in JS based on whether there's anything to say. -->
    <button id="highlight-chip" class="highlight-chip hidden" type="button" aria-live="polite">
        <span class="highlight-chip-swatch" aria-hidden="true"></span>
        <span class="highlight-chip-text">
            <span class="highlight-chip-label">Highlighting</span>
            <span class="highlight-chip-note hidden"></span>
        </span>
        <span class="highlight-chip-stats hidden" aria-hidden="true"></span>
        <svg class="highlight-chip-close" width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <line x1="2" y1="2" x2="12" y2="12"/>
            <line x1="12" y1="2" x2="2" y2="12"/>
        </svg>
    </button>

    <!-- Floating button stacks — split into two corner-anchored groups
         on the right edge. Top-right holds Locate (top, most-used —
         frequently checked while riding) and Options (just below).
         Bottom-right holds Search alone, where a one-handed thumb
         naturally rests. Both groups respect the same 12 px corner
         inset as the brand element on the left.

         Z-INDEX vs OVERLAYS: FABs sit BELOW the open overlay
         (overlay z=6/7, FAB z=5) so the overlay panel and its
         close-X cleanly cover the FABs at the same corner — no
         visual overlap at the close button. The trade-off is that
         while one overlay is open, tapping the OTHER FAB to switch
         doesn't work (the FAB is hidden by the overlay's backdrop).
         The rider has to close the current overlay first, then tap
         the other FAB. That's an acceptable two-tap switch given
         how rarely overlays are used together. The MapLibre
         attribution sits at bottom-LEFT (separate corner, no
         conflict). -->
    <div id="fab-stack-top" class="fab-stack fab-stack-top" role="group" aria-label="Map controls — locate, reset view, and options">
        <button id="toggle-locate" class="fab" type="button" aria-pressed="false" aria-label="Locate me">
            <!-- mdi:crosshairs-gps (Apache 2.0, Pictogrammers) — inner dot
                 split into a separate <circle class="locate-dot"> so CSS can
                 hide it independently in the locate-state-background[-error]
                 states (tracking continues but user has panned away from
                 their position; no centre dot). -->
            <svg class="locate-icon" viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">
                <circle class="locate-dot" cx="12" cy="12" r="4"/>
                <path d="M3.05,13H1V11H3.05C3.5,6.83 6.83,3.5 11,3.05V1H13V3.05C17.17,3.5 20.5,6.83 20.95,11H23V13H20.95C20.5,17.17 17.17,20.5 13,20.95V23H11V20.95C6.83,20.5 3.5,17.17 3.05,13M12,5A7,7 0 0,0 5,12A7,7 0 0,0 12,19A7,7 0 0,0 19,12A7,7 0 0,0 12,5Z"/>
            </svg>
        </button>
        <button id="toggle-reset-view" class="fab fab-reset-view" type="button" aria-label="Reset view">
            <!-- mdi:image-filter-center-focus (Apache 2.0, Pictogrammers).
                 Four corner brackets + a centre dot — the universal
                 viewfinder / "frame this content" pattern. Chosen over
                 mdi:reload (refresh metaphor reads as network reload, not
                 view reset) and mdi:home (navigates home, but our reset
                 isn't going home — it's reframing the same content). The
                 corner brackets reinforce "fit to bounds" semantically. -->
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">
                <path d="M5,15H3V19A2,2 0 0,0 5,21H9V19H5M5,5H9V3H5A2,2 0 0,0 3,5V9H5M19,3H15V5H19V9H21V5A2,2 0 0,0 19,3M19,19H15V21H19A2,2 0 0,0 21,19V15H19M12,9A3,3 0 0,0 9,12A3,3 0 0,0 12,15A3,3 0 0,0 15,12A3,3 0 0,0 12,9Z"/>
            </svg>
        </button>
        <button id="toggle-options" class="fab" type="button" aria-label="Options" aria-pressed="false" aria-controls="options-overlay">
            <!-- mdi:tune (Apache 2.0, Pictogrammers) -->
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">
                <path d="M3,17V19H9V17H3M3,5V7H13V5H3M13,21V19H21V17H13V15H11V21H13M7,9V11H3V13H7V15H9V9H7M21,13V11H11V13H21M15,9H17V7H21V5H17V3H15V9Z"/>
            </svg>
        </button>
    </div>
    <div id="fab-stack-bottom" class="fab-stack fab-stack-bottom" role="group" aria-label="Map controls — search">
        <button id="toggle-search" class="fab" type="button" aria-label="Search routes, trails, and places" aria-pressed="false" aria-controls="search-overlay">
            <!-- mdi:magnify (Apache 2.0, Pictogrammers) -->
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">
                <path d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"/>
            </svg>
        </button>
    </div>

    <!-- Search overlay — full-viewport layer with a panel inside.
         The outer .search-overlay is the backdrop dim + click-outside
         target. The inner .search-overlay-panel is the actual visible
         chrome (half-sheet on mobile, centred card on desktop).
         Triggered by the Search FAB; dismissed by Cancel button, Esc,
         tap on the backdrop (anywhere outside the panel), result
         selection, or tapping the Search FAB again. -->
    <div id="search-overlay" class="search-overlay" role="dialog" aria-modal="false" aria-label="Search routes, trails, and places" hidden>
        <div class="search-overlay-panel">
            <div class="search-overlay-header">
                <div class="search-input-wrap">
                    <input type="search" id="finder-input" class="search-overlay-input"
                        placeholder="Search routes, trails, places…" aria-label="Search routes, trails, and places"
                        autocomplete="off" spellcheck="false"
                        role="combobox" aria-controls="finder-list" aria-autocomplete="list"
                        aria-expanded="true" aria-activedescendant="">
                    <button type="button" id="finder-clear" class="search-clear-btn hidden" aria-label="Clear search">
                        <!-- mdi:close (Apache 2.0, Pictogrammers) -->
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" aria-hidden="true">
                            <path d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"/>
                        </svg>
                    </button>
                </div>
                <button id="search-cancel" class="overlay-close-btn" type="button" aria-label="Close search">
                    <!-- mdi:close (Apache 2.0, Pictogrammers) -->
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
                        <path d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"/>
                    </svg>
                </button>
            </div>
            <div class="search-overlay-filters" id="search-filters" role="tablist" aria-label="Filter search by type">
                <button type="button" class="search-filter-chip" data-filter="all" role="tab" aria-selected="true">All</button>
                <button type="button" class="search-filter-chip" data-filter="route" role="tab" aria-selected="false">Routes</button>
                <button type="button" class="search-filter-chip" data-filter="trail" role="tab" aria-selected="false">Trails</button>
                <button type="button" class="search-filter-chip" data-filter="poi" role="tab" aria-selected="false">Places</button>
            </div>
            <div class="search-overlay-results" id="finder-list" role="listbox" aria-label="Routes, trails, and places">
                <!-- Rows rendered by app.js -->
            </div>
            <p class="search-overlay-empty hidden" id="finder-empty">No matches.</p>
        </div>
    </div>

    <!-- Options overlay — full-viewport layer with a panel inside.
         Same outer-backdrop / inner-panel pattern as the Search
         overlay so dimming + dismissal behave consistently. On
         mobile the panel fills the viewport (dim is hidden behind
         the panel); on desktop the panel is a centred card with the
         dim visible around it. Triggered by the Options FAB;
         dismissed by Close X, Esc, tap on the backdrop, or tapping
         the Options FAB again. -->
    <div id="options-overlay" class="options-overlay" role="dialog" aria-modal="true" aria-labelledby="options-overlay-title" hidden>
        <div class="options-overlay-panel">
            <div class="options-overlay-header">
                <h2 id="options-overlay-title" class="options-overlay-title">Options</h2>
                <button id="options-close" class="overlay-close-btn" type="button" aria-label="Close options">
                    <!-- mdi:close (Apache 2.0, Pictogrammers) -->
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
                        <path d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"/>
                    </svg>
                </button>
            </div>
            <div class="options-overlay-body">
            <!-- What to show — collapsible accordion (default open).
                 Holds every layer-visibility toggle, the Labels segmented
                 control, Season cycle, Emergency Access toggle, and (Phase 2)
                 Toilets + Drinking Water — one unified group of "what's
                 painted on the map." -->
            <section class="opt-section" id="section-what-to-show">
                <h3 class="opt-section-header">
                    <span class="opt-section-title">What to show</span>
                </h3>
                <div class="opt-section-body" id="section-what-to-show-body">
                    <!-- Labels — segmented control on the right (Routes
                         / Trails / None). mdi:label icon for visual
                         identity matching neighbouring rows. -->
                    <div class="opt-row opt-toggle-row opt-toggle-row-segmented" id="label-field">
                        <span class="layer-swatch label-swatch" aria-hidden="true">
                            <!-- mdi:label (Apache 2.0, Pictogrammers) -->
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true">
                                <path d="M17.63,5.84C17.27,5.33 16.67,5 16,5H5A2,2 0 0,0 3,7V17A2,2 0 0,0 5,19H16C16.67,19 17.27,18.66 17.63,18.15L22,12L17.63,5.84Z"/>
                            </svg>
                        </span>
                        <span class="opt-toggle-row-label" id="label-group-label">Labels</span>
                        <div class="opt-segmented opt-segmented-pill" role="radiogroup" aria-labelledby="label-group-label" id="label-segmented">
                            <button type="button" class="opt-segmented-btn" data-value="routes" role="radio" aria-checked="false">Routes</button>
                            <button type="button" class="opt-segmented-btn" data-value="trails" role="radio" aria-checked="false">Trails</button>
                            <button type="button" class="opt-segmented-btn" data-value="none" role="radio" aria-checked="false">None</button>
                        </div>
                    </div>

                    <div class="opt-row opt-toggle-row opt-toggle-row-segmented" id="toggle-difficulty" data-poi="difficulty" aria-pressed="true">
                        <span class="layer-swatch difficulty-swatch" aria-hidden="true"></span>
                        <span class="opt-toggle-row-label">Difficulty</span>
                        <div class="opt-segmented opt-segmented-pill" role="radiogroup" aria-label="Difficulty">
                            <button type="button" class="opt-segmented-btn" data-value="on" role="radio" aria-checked="true">On</button>
                            <button type="button" class="opt-segmented-btn" data-value="off" role="radio" aria-checked="false">Off</button>
                        </div>
                    </div>

                    <!-- Direction arrows — controls visibility of the
                         decor-arrow MapLibre layer (chevrons placed
                         along one-way / reversible trails). Hidden
                         entirely when the build emitted no arrows
                         (set by app.js after the layer renders). -->
                    <div class="opt-row opt-toggle-row opt-toggle-row-segmented hidden" id="toggle-direction-arrows" data-poi="direction_arrows" aria-pressed="true">
                        <span class="layer-swatch direction-arrows-swatch" aria-hidden="true">
                            <!-- Arrow path pixel-matched to the on-map
                                 drawArrow() canvas shape (see app.js).
                                 Coordinates are drawArrow's tip=0.94,
                                 back=0.14, notch=0.32, half=0.42
                                 multipliers applied at size=22, then
                                 scaled into a 24-unit viewBox (×24/22).
                                 The path's stroke is the on-map halo
                                 (lineWidth=4 in 22-unit space → 4.36
                                 in 24-unit space) with paint-order
                                 stroke-then-fill so the halo sits
                                 under the fill, exactly like
                                 drawArrow's stroke-then-fill order. -->
                            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                <path d="M22.56,12 L3.36,1.92 L7.68,12 L3.36,22.08 Z"/>
                            </svg>
                        </span>
                        <span class="opt-toggle-row-label">Direction Arrows</span>
                        <div class="opt-segmented opt-segmented-pill" role="radiogroup" aria-label="Direction Arrows">
                            <button type="button" class="opt-segmented-btn" data-value="on" role="radio" aria-checked="true">On</button>
                            <button type="button" class="opt-segmented-btn" data-value="off" role="radio" aria-checked="false">Off</button>
                        </div>
                    </div>

                    <div class="opt-row opt-toggle-row opt-toggle-row-segmented" id="toggle-markers" data-poi="markers" aria-pressed="true">
                        <span class="layer-swatch marker-swatch" aria-hidden="true">#</span>
                        <span class="opt-toggle-row-label">Trail Markers</span>
                        <div class="opt-segmented opt-segmented-pill" role="radiogroup" aria-label="Trail Markers">
                            <button type="button" class="opt-segmented-btn" data-value="on" role="radio" aria-checked="true">On</button>
                            <button type="button" class="opt-segmented-btn" data-value="off" role="radio" aria-checked="false">Off</button>
                        </div>
                    </div>

                    <div class="opt-row opt-toggle-row opt-toggle-row-segmented" id="toggle-trailheads" data-poi="trailheads" aria-pressed="true">
                        <span class="layer-swatch trailhead-swatch" aria-hidden="true">TH</span>
                        <span class="opt-toggle-row-label">Trailheads</span>
                        <div class="opt-segmented opt-segmented-pill" role="radiogroup" aria-label="Trailheads">
                            <button type="button" class="opt-segmented-btn" data-value="on" role="radio" aria-checked="true">On</button>
                            <button type="button" class="opt-segmented-btn" data-value="off" role="radio" aria-checked="false">Off</button>
                        </div>
                    </div>

                    <div class="opt-row opt-toggle-row opt-toggle-row-segmented" id="toggle-parking" data-poi="parking" aria-pressed="true">
                        <span class="layer-swatch parking-swatch" aria-hidden="true">P</span>
                        <span class="opt-toggle-row-label">Parking</span>
                        <div class="opt-segmented opt-segmented-pill" role="radiogroup" aria-label="Parking">
                            <button type="button" class="opt-segmented-btn" data-value="on" role="radio" aria-checked="true">On</button>
                            <button type="button" class="opt-segmented-btn" data-value="off" role="radio" aria-checked="false">Off</button>
                        </div>
                    </div>

                    <div class="opt-row opt-toggle-row opt-toggle-row-segmented" id="toggle-features" data-poi="features" aria-pressed="true">
                        <span class="layer-swatch feature-swatch" aria-hidden="true"></span>
                        <span class="opt-toggle-row-label">Features</span>
                        <div class="opt-segmented opt-segmented-pill" role="radiogroup" aria-label="Features">
                            <button type="button" class="opt-segmented-btn" data-value="on" role="radio" aria-checked="true">On</button>
                            <button type="button" class="opt-segmented-btn" data-value="off" role="radio" aria-checked="false">Off</button>
                        </div>
                    </div>

                    <!-- Toilets — OSM amenity=toilets. Hidden by default;
                         app.js reveals only when pois.geojson contains
                         at least one toilet feature. -->
                    <div class="opt-row opt-toggle-row opt-toggle-row-segmented hidden" id="toggle-toilets" data-poi="toilets" aria-pressed="true">
                        <span class="layer-swatch toilet-swatch" aria-hidden="true">
                            <!-- mdi:human-male-female (Apache 2.0, Pictogrammers) -->
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true">
                                <path d="M7.5,2A2,2 0 0,1 9.5,4A2,2 0 0,1 7.5,6A2,2 0 0,1 5.5,4A2,2 0 0,1 7.5,2M6,7H9A2,2 0 0,1 11,9V14.5H9.5V22H5.5V14.5H4V9A2,2 0 0,1 6,7M16.5,2A2,2 0 0,1 18.5,4A2,2 0 0,1 16.5,6A2,2 0 0,1 14.5,4A2,2 0 0,1 16.5,2M15,22V16H12L14.59,8.41C14.84,7.59 15.6,7 16.5,7C17.4,7 18.16,7.59 18.41,8.41L21,16H18V22H15Z"/>
                            </svg>
                        </span>
                        <span class="opt-toggle-row-label">Toilets</span>
                        <div class="opt-segmented opt-segmented-pill" role="radiogroup" aria-label="Toilets">
                            <button type="button" class="opt-segmented-btn" data-value="on" role="radio" aria-checked="true">On</button>
                            <button type="button" class="opt-segmented-btn" data-value="off" role="radio" aria-checked="false">Off</button>
                        </div>
                    </div>

                    <!-- Drinking water — OSM amenity=drinking_water.
                         Hidden by default; app.js reveals only when
                         pois.geojson contains at least one. -->
                    <div class="opt-row opt-toggle-row opt-toggle-row-segmented hidden" id="toggle-drinking-water" data-poi="drinking_water" aria-pressed="true">
                        <span class="layer-swatch drinking-water-swatch" aria-hidden="true">
                            <!-- mdi:water (Apache 2.0, Pictogrammers) -->
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true">
                                <path d="M12,20A6,6 0 0,1 6,14C6,10 12,3.25 12,3.25C12,3.25 18,10 18,14A6,6 0 0,1 12,20Z"/>
                            </svg>
                        </span>
                        <span class="opt-toggle-row-label">Drinking Water</span>
                        <div class="opt-segmented opt-segmented-pill" role="radiogroup" aria-label="Drinking Water">
                            <button type="button" class="opt-segmented-btn" data-value="on" role="radio" aria-checked="true">On</button>
                            <button type="button" class="opt-segmented-btn" data-value="off" role="radio" aria-checked="false">Off</button>
                        </div>
                    </div>

                    <!-- Emergency Access — same toggle-row format as the
                         POI toggles. Uses aria-pressed; app.js wires
                         click handler that mirrors emergencyOn into
                         localStorage + applyVisibilityChange(). Hidden
                         by default; revealed only when the map has at
                         least one emergency-tagged route. -->
                    <div class="opt-row opt-toggle-row opt-toggle-row-segmented hidden" id="toggle-emergency-routes" aria-pressed="false">
                        <span class="layer-swatch emergency-swatch" aria-hidden="true">!</span>
                        <span class="opt-toggle-row-label">Emergency Access Routes</span>
                        <div class="opt-segmented opt-segmented-pill" role="radiogroup" aria-label="Emergency Access Routes">
                            <button type="button" class="opt-segmented-btn" data-value="on" role="radio" aria-checked="false">On</button>
                            <button type="button" class="opt-segmented-btn" data-value="off" role="radio" aria-checked="true">Off</button>
                        </div>
                    </div>

                    <!-- Season — segmented control with both options
                         visible (Summer / Winter), matching the Labels
                         row's pattern. Sun/snow swatch on the left
                         updates dynamically to reflect the current
                         selection. The whole row is a div (not a
                         button) — only the inner segmented buttons are
                         interactive. Sits at the bottom of the section
                         because it's a "trail-conditions" mode rather
                         than a "what's painted on the map" toggle —
                         visually grouped apart from the on/off rows. -->
                    <div class="opt-row opt-toggle-row opt-toggle-row-segmented season-toggle-row" id="season-field">
                        <span class="layer-swatch season-swatch" aria-hidden="true">
                            <!-- mdi:weather-sunny (Apache 2.0, Pictogrammers). Replaced at
                                 runtime by app.js's reflectSeason() with mdi:snowflake when
                                 season switches to winter. -->
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true">
                                <path d="M12,7A5,5 0 0,1 17,12A5,5 0 0,1 12,17A5,5 0 0,1 7,12A5,5 0 0,1 12,7M12,9A3,3 0 0,0 9,12A3,3 0 0,0 12,15A3,3 0 0,0 15,12A3,3 0 0,0 12,9M12,2L14.39,5.42C13.65,5.15 12.84,5 12,5C11.16,5 10.35,5.15 9.61,5.42L12,2M3.34,7L7.5,6.65C6.9,7.16 6.36,7.78 5.94,8.5C5.5,9.24 5.25,10 5.11,10.79L3.34,7M3.36,17L5.12,13.23C5.26,14 5.53,14.78 5.95,15.5C6.37,16.24 6.91,16.86 7.5,17.37L3.36,17M20.65,7L18.88,10.79C18.74,10 18.47,9.23 18.05,8.5C17.63,7.78 17.1,7.15 16.5,6.64L20.65,7M20.64,17L16.5,17.36C17.09,16.85 17.62,16.22 18.04,15.5C18.46,14.77 18.73,14 18.87,13.21L20.64,17M12,22L9.59,18.56C10.33,18.83 11.14,19 12,19C12.82,19 13.63,18.83 14.37,18.56L12,22Z"/>
                            </svg>
                        </span>
                        <span class="opt-toggle-row-label" id="season-group-label">Season</span>
                        <div class="opt-segmented opt-segmented-pill" role="radiogroup" aria-labelledby="season-group-label" id="season-segmented">
                            <button type="button" class="opt-segmented-btn" data-value="summer" role="radio" aria-checked="true">Summer</button>
                            <button type="button" class="opt-segmented-btn" data-value="winter" role="radio" aria-checked="false">Winter</button>
                        </div>
                    </div>

                    <!-- Appearance — colour scheme (light / dark / auto).
                         Auto follows the rider's OS preference via
                         prefers-color-scheme; the Light/Dark options are
                         explicit overrides that win until the rider changes
                         them. JS wires the click handler in setupBottomSheet
                         to applyColorScheme(), which persists to LS,
                         rebuilds the Protomaps basemap with the matching
                         flavor, and re-applies per-scheme map paint tokens
                         (label colours, arrow icon variant). Lives at the
                         bottom of "What to show" with Season — both are
                         "viewing mode" controls rather than per-layer toggles. -->
                    <div class="opt-row opt-toggle-row opt-toggle-row-segmented" id="color-scheme-field">
                        <span class="layer-swatch appearance-swatch" aria-hidden="true">
                            <!-- mdi:theme-light-dark (Apache 2.0,
                                 Pictogrammers). Canonical Material
                                 Design "theme switcher" glyph: a
                                 split sun/moon. Reads as "appearance"
                                 in either scheme. -->
                            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                <path d="M7.5,2C5.71,3.15 4.5,5.18 4.5,7.5C4.5,9.82 5.71,11.85 7.53,13C4.46,13 2,10.54 2,7.5A5.5,5.5 0 0,1 7.5,2M19.07,3.5L20.5,4.93L4.93,20.5L3.5,19.07L19.07,3.5M12.89,5.93L11.41,5L9.97,6L10.39,4.3L9,3.24L10.75,3.12L11.33,1.47L12,3.1L13.73,3.13L12.38,4.26L12.89,5.93M9.59,9.54L8.43,8.81L7.31,9.59L7.65,8.27L6.56,7.44L7.92,7.35L8.37,6.06L8.88,7.33L10.24,7.36L9.19,8.23L9.59,9.54M19,13.5A5.5,5.5 0 0,1 13.5,19C12.28,19 11.15,18.6 10.24,17.93L17.93,10.24C18.6,11.15 19,12.28 19,13.5M14.6,20.08L17.37,18.93L17.13,22.28L14.6,20.08M18.93,17.38L20.08,14.61L22.28,17.15L18.93,17.38M20.08,12.42L18.94,9.64L22.28,9.88L20.08,12.42M17.4,8.07L14.62,6.93L17.16,4.73L17.4,8.07Z"/>
                            </svg>
                        </span>
                        <span class="opt-toggle-row-label" id="color-scheme-group-label">Appearance</span>
                        <div class="opt-segmented opt-segmented-pill" role="radiogroup" aria-labelledby="color-scheme-group-label" id="color-scheme-segmented">
                            <button type="button" class="opt-segmented-btn" data-value="light" role="radio" aria-checked="true">Light</button>
                            <button type="button" class="opt-segmented-btn" data-value="dark" role="radio" aria-checked="false">Dark</button>
                            <button type="button" class="opt-segmented-btn" data-value="auto" role="radio" aria-checked="false">Auto</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Map style — basemap selector. Hidden when no base_layers configured. -->
            <section class="opt-section hidden" id="section-style">
                <h3 class="opt-section-header">
                    <span class="opt-section-title">Map style</span>
                </h3>
                <div class="opt-section-body" id="section-style-body">
                    <div class="opt-row opt-row-field" id="basemap-field">
                        <label class="opt-field-label" for="basemap-select">Basemap</label>
                        <select id="basemap-select" class="opt-select"></select>
                    </div>
                </div>
            </section>

            <!-- Share / Install / About — three full-row action buttons.
                 No section header: the action rows are visually distinct
                 from the toggle rows above (full-row buttons with icons +
                 descriptions vs. toggle chips with segmented controls),
                 so a generic "More" label adds noise without information.
                 The .opt-section's existing border-top hairline still
                 provides the visual break between layer toggles and
                 actions. -->
            <section class="opt-section" id="section-more">
                <div class="opt-section-body" id="section-more-body">
                    <!-- Share start -->
                    <button id="share-btn" class="opt-action-row hidden" type="button">
                        <span class="opt-action-icon" aria-hidden="true">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M4 12v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7"/>
                                <polyline points="16 6 12 2 8 6"/>
                                <line x1="12" y1="2" x2="12" y2="15"/>
                            </svg>
                        </span>
                        <span class="opt-action-text">
                            <span class="opt-action-title">Share this view</span>
                            <span class="opt-action-help">Copy a link to the current map view, including any highlighted route or trail.</span>
                        </span>
                    </button>
                    <!-- Share end -->

                    <!-- PWA start -->
                    <button id="install-btn" class="opt-action-row install-btn hidden" type="button">
                        <span class="install-btn-icon" aria-hidden="true">
                            <img src="icons/android-chrome-192x192.png" alt="">
                        </span>
                        <span class="opt-action-text">
                            <span class="opt-action-title">Install as app</span>
                            <span class="opt-action-help">Install locally for offline use.</span>
                        </span>
                    </button>
                    <!-- PWA end -->

                    <button id="about-btn" class="opt-action-row" type="button">
                        <span class="opt-action-icon" aria-hidden="true">
                            <!-- mdi:information-outline (Apache 2.0, Pictogrammers).
                                 Replaces the previous Unicode &#9432; (ⓘ) which
                                 rendered small/thin/inconsistently across
                                 platforms compared to the SVG icons in the
                                 sibling Share / Install rows. -->
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                <path d="M11,9H13V7H11M12,20C7.59,20 4,16.41 4,12C4,7.59 7.59,4 12,4C16.41,4 20,7.59 20,12C20,16.41 16.41,20 12,20M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M11,17H13V11H11V17Z"/>
                            </svg>
                        </span>
                        <span class="opt-action-text">
                            <span class="opt-action-title">About this map</span>
                        </span>
                    </button>
                </div>
            </section>
        </div>
        </div>
    </div>

    <!-- Welcome modal — first-visit only. Reuses about-modal styling for
         consistency (same backdrop + content card + close button). The
         body is built by app.js so the per-map title (CONFIG.title) and
         features (gated by show_routes / show_trails / share_button /
         pwa_install_prompt) are reflected in the copy. -->
    <div id="welcome-modal" class="about-modal hidden" role="dialog" aria-modal="true" aria-labelledby="welcome-modal-title">
        <div class="about-modal-backdrop"></div>
        <div class="about-modal-content">
            <button class="about-modal-close" aria-label="Close" id="welcome-modal-close">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
                    <line x1="2" y1="2" x2="12" y2="12"/>
                    <line x1="12" y1="2" x2="2" y2="12"/>
                </svg>
            </button>
            <h2 id="welcome-modal-title"></h2>
            <div id="welcome-modal-body"></div>
            <button class="welcome-modal-cta" id="welcome-modal-cta" type="button">Got it</button>
        </div>
    </div>

    <!-- About modal -->
    <div id="about-modal" class="about-modal hidden" role="dialog" aria-modal="true" aria-labelledby="about-modal-title">
        <div class="about-modal-backdrop"></div>
        <div class="about-modal-content">
            <button class="about-modal-close" aria-label="Close">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
                    <line x1="2" y1="2" x2="12" y2="12"/>
                    <line x1="12" y1="2" x2="2" y2="12"/>
                </svg>
            </button>
            <h2 id="about-modal-title"></h2>
            <div id="about-modal-body"></div>
            <div id="about-modal-tail"></div>
        </div>
    </div>

    <script src="app.js"></script>
    <!-- SW start -->
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
    </script>
    <!-- SW end -->
</body>
</html>
