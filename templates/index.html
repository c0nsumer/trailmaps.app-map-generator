<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Trail Map</title>

    <!-- Open Graph + Twitter Card metadata for rich share-link previews.
         Values substituted at build time (copy_templates). Always-on,
         no config gate — these are harmless metadata that benefit
         search engines as well as the Share button (B.3) flow. URLs
         are relative; OG-tag scrapers (Facebook, WhatsApp, Telegram,
         iMessage, Twitter) resolve them against the page URL they
         fetched, and default og:url to the fetched URL when omitted —
         so no canonical-URL config is needed. -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="__OG_TITLE__">
    <meta property="og:description" content="__OG_DESCRIPTION__">
    <meta property="og:image" content="icons/android-chrome-512x512.png">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="__OG_TITLE__">
    <meta name="twitter:description" content="__OG_DESCRIPTION__">
    <meta name="twitter:image" content="icons/android-chrome-512x512.png">

    <!-- Icons start -->
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="manifest" href="icons/site.webmanifest">
    <link rel="mask-icon" href="icons/safari-pinned-tab.svg" color="#5bbad5">
    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="theme-color" content="#ffffff">
    <!-- Icons end -->

    <!-- Vendor libraries (bundled locally for offline support) -->
    <link rel="stylesheet" href="vendor/maplibre-gl.css">
    <script src="vendor/maplibre-gl.js"></script>
    <script src="vendor/pmtiles.js"></script>
    <script src="vendor/basemaps.js"></script>

    <!-- App styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map"></div>

    <!-- Logo overlay -->
    <div id="logo-overlay">
        <img src="logo.webp" alt="Trail system logo">
    </div>

    <!-- Off-screen location indicator (managed by app.js) -->
    <div id="off-screen-indicator" class="off-screen-indicator hidden" aria-hidden="true"></div>

    <!-- Highlight chip — floating at top of map when a route or trail is highlighted -->
    <button id="highlight-chip" class="highlight-chip hidden" type="button" aria-live="polite">
        <span class="highlight-chip-swatch" aria-hidden="true"></span>
        <span class="highlight-chip-label">Highlighting</span>
        <span class="highlight-chip-stats hidden" aria-hidden="true"></span>
        <svg class="highlight-chip-close" width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <line x1="2" y1="2" x2="12" y2="12"/>
            <line x1="12" y1="2" x2="2" y2="12"/>
        </svg>
    </button>

    <!-- Backdrop — fades in when the bottom sheet opens, dimming the
         map behind it so the drawer reads as a focused overlay.
         Tap to close. -->
    <div id="sheet-backdrop" class="sheet-backdrop" aria-hidden="true"></div>

    <!-- Bottom sheet — peek (always visible) + expanded drawer.
         Peek shows just the map title + search button + locate button.
         All set-once toggles (markers, parking, season, etc.) live in
         the drawer's accordion sections. Drawer is a binary modal:
         tap-to-open, drag-down or tap-backdrop or Escape to close. -->
    <div id="bottom-sheet" class="bottom-sheet" role="region" aria-label="Map controls" style="visibility: hidden">
        <div class="sheet-handle" id="sheet-handle" role="button" tabindex="0" aria-label="Open or close map settings" aria-expanded="false">
            <span class="sheet-handle-bar" aria-hidden="true"></span>
        </div>

        <div class="sheet-peek" id="sheet-peek">
            <div class="sheet-peek-row" id="sheet-peek-row" role="group" aria-label="Map controls">
                <div class="sheet-peek-title" id="sheet-peek-title">&nbsp;</div>
                <div class="sheet-peek-actions">
                    <button class="peek-icon peek-icon-bare" id="toggle-search" type="button" aria-label="Search routes, trails, and places">
                        <span class="layer-swatch search-swatch" aria-hidden="true">
                            <!-- mdi:magnify (Apache 2.0, Pictogrammers) -->
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
                                <path d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"/>
                            </svg>
                        </span>
                    </button>
                    <button class="peek-icon peek-icon-bare" id="toggle-locate" type="button" aria-pressed="false" aria-label="Locate me">
                        <span class="layer-swatch locate-swatch" aria-hidden="true">
                            <!-- mdi:crosshairs-gps (Apache 2.0, Pictogrammers) — inner dot
                                 split into a separate <circle class="locate-dot"> so CSS can
                                 hide it independently in the locate-state-background[-error]
                                 states (tracking continues but user has panned away from
                                 their position; no centre dot). -->
                            <svg class="locate-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
                                <circle class="locate-dot" cx="12" cy="12" r="4"/>
                                <path d="M3.05,13H1V11H3.05C3.5,6.83 6.83,3.5 11,3.05V1H13V3.05C17.17,3.5 20.5,6.83 20.95,11H23V13H20.95C20.5,17.17 17.17,20.5 13,20.95V23H11V20.95C6.83,20.5 3.5,17.17 3.05,13M12,5A7,7 0 0,0 5,12A7,7 0 0,0 12,19A7,7 0 0,0 19,12A7,7 0 0,0 12,5Z"/>
                            </svg>
                        </span>
                    </button>
                </div>
            </div>
        </div>

        <div class="sheet-expanded" id="sheet-expanded" aria-hidden="true">
            <!-- Find a route or trail (Phase 1: stays in drawer; Phase 3
                 promotes to a full search overlay) -->
            <section class="sheet-section" id="finder-section">
                <h3 class="sheet-section-title">Find a route or trail</h3>
                <div class="finder">
                    <div class="finder-search">
                        <input type="search" id="finder-input" class="finder-input"
                            placeholder="Search routes &amp; trails" aria-label="Search routes and trails"
                            autocomplete="off" spellcheck="false">
                    </div>
                    <div class="finder-list" id="finder-list" role="listbox" aria-label="Routes and trails">
                        <!-- Rows rendered by app.js -->
                    </div>
                    <p class="finder-empty hidden" id="finder-empty">No matches.</p>
                </div>
            </section>

            <!-- What to show — collapsible accordion (default open).
                 Holds every layer-visibility toggle, the Labels
                 segmented control, Season cycle, Emergency Access
                 toggle, and (Phase 2) Toilets + Drinking Water — one
                 unified group of "what's painted on the map." -->
            <section class="sheet-section sheet-section-collapsible is-open" id="section-what-to-show">
                <button class="sheet-section-header" type="button" aria-expanded="true" aria-controls="section-what-to-show-body">
                    <span class="sheet-section-title">What to show</span>
                    <span class="sheet-section-chevron" aria-hidden="true">
                        <!-- mdi:chevron-down (Apache 2.0, Pictogrammers) -->
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                            <path d="M7.41,8.58L12,13.17L16.59,8.58L18,10L12,16L6,10L7.41,8.58Z"/>
                        </svg>
                    </span>
                </button>
                <div class="sheet-section-body" id="section-what-to-show-body">
                    <!-- Labels — segmented control on the right (Routes
                         / Trails / None). mdi:label icon for visual
                         identity matching neighbouring rows. -->
                    <div class="sheet-row sheet-toggle-row sheet-toggle-row-segmented" id="label-field">
                        <span class="layer-swatch label-swatch" aria-hidden="true">
                            <!-- mdi:label (Apache 2.0, Pictogrammers) -->
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true">
                                <path d="M17.63,5.84C17.27,5.33 16.67,5 16,5H5A2,2 0 0,0 3,7V17A2,2 0 0,0 5,19H16C16.67,19 17.27,18.66 17.63,18.15L22,12L17.63,5.84Z"/>
                            </svg>
                        </span>
                        <span class="sheet-toggle-row-label" id="label-group-label">Labels</span>
                        <div class="sheet-segmented sheet-segmented-pill" role="radiogroup" aria-labelledby="label-group-label" id="label-segmented">
                            <button type="button" class="sheet-segmented-btn" data-value="routes" role="radio" aria-checked="false">Routes</button>
                            <button type="button" class="sheet-segmented-btn" data-value="trails" role="radio" aria-checked="false">Trails</button>
                            <button type="button" class="sheet-segmented-btn" data-value="none" role="radio" aria-checked="false">None</button>
                        </div>
                    </div>

                    <!-- Season — segmented control with both options
                         visible (Summer / Winter), matching the Labels
                         row's pattern. Sun/snow swatch on the left
                         updates dynamically to reflect the current
                         selection. The whole row is a div (not a
                         button) — only the inner segmented buttons are
                         interactive. -->
                    <div class="sheet-row sheet-toggle-row sheet-toggle-row-segmented peek-season" id="season-field">
                        <span class="layer-swatch season-swatch" aria-hidden="true">
                            <!-- mdi:weather-sunny (Apache 2.0, Pictogrammers). Replaced at
                                 runtime by app.js's reflectSeason() with mdi:snowflake when
                                 season switches to winter. -->
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true">
                                <path d="M12,7A5,5 0 0,1 17,12A5,5 0 0,1 12,17A5,5 0 0,1 7,12A5,5 0 0,1 12,7M12,9A3,3 0 0,0 9,12A3,3 0 0,0 12,15A3,3 0 0,0 15,12A3,3 0 0,0 12,9M12,2L14.39,5.42C13.65,5.15 12.84,5 12,5C11.16,5 10.35,5.15 9.61,5.42L12,2M3.34,7L7.5,6.65C6.9,7.16 6.36,7.78 5.94,8.5C5.5,9.24 5.25,10 5.11,10.79L3.34,7M3.36,17L5.12,13.23C5.26,14 5.53,14.78 5.95,15.5C6.37,16.24 6.91,16.86 7.5,17.37L3.36,17M20.65,7L18.88,10.79C18.74,10 18.47,9.23 18.05,8.5C17.63,7.78 17.1,7.15 16.5,6.64L20.65,7M20.64,17L16.5,17.36C17.09,16.85 17.62,16.22 18.04,15.5C18.46,14.77 18.73,14 18.87,13.21L20.64,17M12,22L9.59,18.56C10.33,18.83 11.14,19 12,19C12.82,19 13.63,18.83 14.37,18.56L12,22Z"/>
                            </svg>
                        </span>
                        <span class="sheet-toggle-row-label" id="season-group-label">Season</span>
                        <div class="sheet-segmented sheet-segmented-pill" role="radiogroup" aria-labelledby="season-group-label" id="season-segmented">
                            <button type="button" class="sheet-segmented-btn" data-value="summer" role="radio" aria-checked="true">Summer</button>
                            <button type="button" class="sheet-segmented-btn" data-value="winter" role="radio" aria-checked="false">Winter</button>
                        </div>
                    </div>

                    <button class="sheet-row sheet-toggle-row" id="toggle-difficulty" data-poi="difficulty" type="button" aria-pressed="true">
                        <span class="layer-swatch difficulty-swatch" aria-hidden="true"></span>
                        <span class="sheet-toggle-row-label">Difficulty</span>
                        <span class="sheet-toggle-row-state" aria-hidden="true"></span>
                    </button>

                    <button class="sheet-row sheet-toggle-row" id="toggle-markers" data-poi="markers" type="button" aria-pressed="true">
                        <span class="layer-swatch marker-swatch" aria-hidden="true">#</span>
                        <span class="sheet-toggle-row-label">Trail markers</span>
                        <span class="sheet-toggle-row-state" aria-hidden="true"></span>
                    </button>

                    <button class="sheet-row sheet-toggle-row" id="toggle-trailheads" data-poi="trailheads" type="button" aria-pressed="true">
                        <span class="layer-swatch trailhead-swatch" aria-hidden="true">TH</span>
                        <span class="sheet-toggle-row-label">Trailheads</span>
                        <span class="sheet-toggle-row-state" aria-hidden="true"></span>
                    </button>

                    <button class="sheet-row sheet-toggle-row" id="toggle-parking" data-poi="parking" type="button" aria-pressed="true">
                        <span class="layer-swatch parking-swatch" aria-hidden="true">P</span>
                        <span class="sheet-toggle-row-label">Parking</span>
                        <span class="sheet-toggle-row-state" aria-hidden="true"></span>
                    </button>

                    <button class="sheet-row sheet-toggle-row" id="toggle-features" data-poi="features" type="button" aria-pressed="true">
                        <span class="layer-swatch feature-swatch" aria-hidden="true"></span>
                        <span class="sheet-toggle-row-label">Features</span>
                        <span class="sheet-toggle-row-state" aria-hidden="true"></span>
                    </button>

                    <!-- Toilets — OSM amenity=toilets. Hidden by default;
                         app.js reveals only when pois.geojson contains
                         at least one toilet feature. -->
                    <button class="sheet-row sheet-toggle-row hidden" id="toggle-toilets" data-poi="toilets" type="button" aria-pressed="true">
                        <span class="layer-swatch toilet-swatch" aria-hidden="true">
                            <!-- mdi:human-male-female (Apache 2.0, Pictogrammers) -->
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true">
                                <path d="M7.5,2A2,2 0 0,1 9.5,4A2,2 0 0,1 7.5,6A2,2 0 0,1 5.5,4A2,2 0 0,1 7.5,2M6,7H9A2,2 0 0,1 11,9V14.5H9.5V22H5.5V14.5H4V9A2,2 0 0,1 6,7M16.5,2A2,2 0 0,1 18.5,4A2,2 0 0,1 16.5,6A2,2 0 0,1 14.5,4A2,2 0 0,1 16.5,2M15,22V16H12L14.59,8.41C14.84,7.59 15.6,7 16.5,7C17.4,7 18.16,7.59 18.41,8.41L21,16H18V22H15Z"/>
                            </svg>
                        </span>
                        <span class="sheet-toggle-row-label">Toilets</span>
                        <span class="sheet-toggle-row-state" aria-hidden="true"></span>
                    </button>

                    <!-- Drinking water — OSM amenity=drinking_water.
                         Hidden by default; app.js reveals only when
                         pois.geojson contains at least one. -->
                    <button class="sheet-row sheet-toggle-row hidden" id="toggle-drinking-water" data-poi="drinking_water" type="button" aria-pressed="true">
                        <span class="layer-swatch drinking-water-swatch" aria-hidden="true">
                            <!-- mdi:water (Apache 2.0, Pictogrammers) -->
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true">
                                <path d="M12,20A6,6 0 0,1 6,14C6,10 12,3.25 12,3.25C12,3.25 18,10 18,14A6,6 0 0,1 12,20Z"/>
                            </svg>
                        </span>
                        <span class="sheet-toggle-row-label">Drinking water</span>
                        <span class="sheet-toggle-row-state" aria-hidden="true"></span>
                    </button>

                    <!-- Emergency Access — same toggle-row format as the
                         POI toggles. Uses aria-pressed; app.js wires
                         click handler that mirrors emergencyOn into
                         localStorage + applyVisibilityChange(). Hidden
                         by default; revealed only when the map has at
                         least one emergency-tagged route. -->
                    <button class="sheet-row sheet-toggle-row hidden" id="toggle-emergency-routes" type="button" aria-pressed="false">
                        <span class="layer-swatch emergency-swatch" aria-hidden="true">!</span>
                        <span class="sheet-toggle-row-label">Emergency access routes</span>
                        <span class="sheet-toggle-row-state" aria-hidden="true"></span>
                    </button>
                </div>
            </section>

            <!-- Map style — basemap selector -->
            <section class="sheet-section sheet-section-collapsible hidden" id="section-style">
                <button class="sheet-section-header" type="button" aria-expanded="false" aria-controls="section-style-body">
                    <span class="sheet-section-title">Map style</span>
                    <span class="sheet-section-chevron" aria-hidden="true">
                        <!-- mdi:chevron-down (Apache 2.0, Pictogrammers) -->
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                            <path d="M7.41,8.58L12,13.17L16.59,8.58L18,10L12,16L6,10L7.41,8.58Z"/>
                        </svg>
                    </span>
                </button>
                <div class="sheet-section-body" id="section-style-body">
                    <div class="sheet-row sheet-row-field" id="basemap-field">
                        <label class="sheet-field-label" for="basemap-select">Basemap</label>
                        <select id="basemap-select" class="sheet-select"></select>
                    </div>
                </div>
            </section>

            <!-- Share start -->
            <section class="sheet-section sheet-section-action hidden" id="sheet-share-section">
                <button id="share-btn" class="sheet-action-row" type="button">
                    <span class="sheet-action-icon" aria-hidden="true">
                        <!-- Share glyph: arrow from a tray. Stroke-only so it
                             tints with currentColor, matches the About icon
                             style. -->
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 12v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7"/>
                            <polyline points="16 6 12 2 8 6"/>
                            <line x1="12" y1="2" x2="12" y2="15"/>
                        </svg>
                    </span>
                    <span class="sheet-action-text">
                        <span class="sheet-action-title">Share this view</span>
                        <span class="sheet-action-help">Copy a link to the current map view, including any highlighted route or trail.</span>
                    </span>
                </button>
            </section>
            <!-- Share end -->

            <!-- PWA start -->
            <section class="sheet-section sheet-section-action hidden" id="sheet-install-section">
                <button id="install-btn" class="sheet-action-row install-btn hidden" type="button">
                    <span class="install-btn-icon" aria-hidden="true">
                        <img src="icons/android-chrome-192x192.png" alt="">
                    </span>
                    <span class="sheet-action-text">
                        <span class="sheet-action-title">Install as app</span>
                        <span class="sheet-action-help">Add to your home screen for offline use.</span>
                    </span>
                </button>
                <div id="ios-install-hint" class="sheet-install-hint hidden">
                    <p>To install: tap <strong>Share</strong>, then <strong>Add to Home Screen</strong>.</p>
                </div>
            </section>
            <!-- PWA end -->

            <section class="sheet-section sheet-section-action">
                <button id="about-btn" class="sheet-action-row" type="button">
                    <span class="sheet-action-icon" aria-hidden="true">&#9432;</span>
                    <span class="sheet-action-text">
                        <span class="sheet-action-title">About this map</span>
                    </span>
                </button>
            </section>
        </div>
    </div>

    <!-- Welcome modal — first-visit only. Reuses about-modal styling for
         consistency (same backdrop + content card + close button). The
         body is built by app.js so the per-map title (CONFIG.title) and
         features (gated by show_routes / show_trails / share_button /
         pwa_install_prompt) are reflected in the copy. -->
    <div id="welcome-modal" class="about-modal hidden" role="dialog" aria-modal="true" aria-labelledby="welcome-modal-title">
        <div class="about-modal-backdrop"></div>
        <div class="about-modal-content">
            <button class="about-modal-close" aria-label="Close" id="welcome-modal-close">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
                    <line x1="2" y1="2" x2="12" y2="12"/>
                    <line x1="12" y1="2" x2="2" y2="12"/>
                </svg>
            </button>
            <h2 id="welcome-modal-title"></h2>
            <div id="welcome-modal-body"></div>
            <button class="welcome-modal-cta" id="welcome-modal-cta" type="button">Got it</button>
        </div>
    </div>

    <!-- About modal -->
    <div id="about-modal" class="about-modal hidden" role="dialog" aria-modal="true" aria-labelledby="about-modal-title">
        <div class="about-modal-backdrop"></div>
        <div class="about-modal-content">
            <button class="about-modal-close" aria-label="Close">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
                    <line x1="2" y1="2" x2="12" y2="12"/>
                    <line x1="12" y1="2" x2="2" y2="12"/>
                </svg>
            </button>
            <h2 id="about-modal-title"></h2>
            <div id="about-modal-body"></div>
            <div id="about-modal-tail"></div>
        </div>
    </div>

    <script src="app.js"></script>
    <!-- SW start -->
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
    </script>
    <!-- SW end -->
</body>
</html>
