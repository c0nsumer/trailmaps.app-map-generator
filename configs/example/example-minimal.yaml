name: My Trails
slug: my-trails
title: "My Trails Map"
# OSM relation ID anchoring this map. May be a super-relation (its
# member relations become routes) or a single route relation (used
# directly as the only route). See README "Concepts" for terminology
# and "Config Reference -> Data Sources" for how to find the ID.
root_relation_id: 12345678

# --- Data sources ---
# osm_file: osm.osm
# extra_relations: []
# clipped_relations: []
# winter_relations: []
# summer_relations: []
# emergency_access_relations: []
# custom_routes: []

# --- Per-route style overrides ---
# color_by: relation
# default_trail_color: "#808080"
# dashed_relations: {}
# relation_colors: {}
# default_direction_schedule: {}
# direction_schedules: {}

# --- Marker colours ---
# marker_color: "#795548"
# marker_text_color: "white"
# marker_border_color: "white"
# parking_color: "#2980b9"
# parking_text_color: "white"
# parking_border_color: "white"
# trailhead_color: "#27ae60"
# trailhead_text_color: "white"
# trailhead_border_color: "white"
# feature_color: "#8e44ad"
# feature_ring_color: "#ffffff"

# --- View geometry ---
# bbox: [-87.66, 46.47, -87.59, 46.53]
# pan_padding: 0.5
# center: [-87.635, 46.495]
# zoom: 14
# min_zoom: 10
# max_zoom: 18
# basemap_maxzoom: 15
# terrain_maxzoom: 13

# --- PWA ---
# pwa: true
# Surface PWA install affordances on platforms that support them.
# When true: Chrome's native mini-infobar shows AND our custom Install
# button (in the expanded sheet) is visible alongside it; iOS Safari
# users see manual Add-to-Home-Screen instructions. When false
# (default): the beforeinstallprompt handler is not registered at all
# — silences Chrome's "page must call prompt()" console warning — and
# the custom Install button is hidden everywhere.
# pwa_install_prompt: false

# --- Build-time data gates ---
# show_markers: true
# show_parking: true
# show_trailheads: true
# show_features: true
# poi_proximity_m: 50
# show_terrain: true
# show_difficulty: false
# show_routes: true
# show_trails: true
# suppress_path_labels: false
# suppress_basemap_pois: false
# Per-route stats in the Finder + highlight chip. Distance is cheap
# (haversine sum at build time, no data dependency). Elevation gain
# + loss come from opentopodata.org's free SRTM30m endpoint at build
# time (cached in cache/route_stats/, ~5–20 API calls per typical
# map); the build auto-retries on rate limits and degrades to
# no-data on persistent failure rather than failing. Independent of
# show_terrain — elevation stats and the hillshade layer come from
# different data paths and can be toggled separately.
# show_route_distance: false
# show_route_elevation: false

# --- Display ---
# default_labels: routes
# map_dim_on_highlight: true
# url_hash: false
# Units used for ALL distance and elevation values shown in the app —
# off-screen-indicator distance pill, route stats in the Finder,
# highlight chip, any future distance display. The underlying data is
# always meters; this only affects render-time formatting. Values:
# "mi" → ft + decimal mi (and ft for elevation gain) — default.
# "km" → m + decimal km (and m for elevation gain) — metric regions.
# distance_units: mi
# Share button in the expanded sheet. Generates a shareable URL of
# the current view + highlighted route/trail and surfaces it via the
# Web Share API (or clipboard fallback). Default true. Set false for
# private/family maps where you don't want the affordance.
# share_button: true

# --- Base layers ---
# base_layers: []

# --- Branding ---
# logo: logo.webp
# icon: icon.png

