# Minimal map config — every supported key in canonical order, commented
# out at the framework default. Uncomment only the lines you need to
# customise. The README "Configuration → Config Reference" tables are
# the canonical description for each knob (what it does, accepted
# values, why the default is what it is); this file is the copy-paste
# skeleton for a new map.

# --- Identity (REQUIRED) ---
name: My Trails
slug: my-trails
title: "My Trails Map"
# OSM relation ID. May be a super-relation (its members become routes)
# or a single route relation. See README "Quick Start → Build a Map".
root_relation_id: 12345678

# --- Data sources ---
# osm_file: osm.osm
# extra_relations: []
# clipped_relations: []
# winter_relations: []
# summer_relations: []
# emergency_access_relations: []
# custom_routes: []

# --- View geometry ---
# bbox: [-87.66, 46.47, -87.59, 46.53]
# pan_padding: 0.5
# pan_bbox: [-87.70, 46.44, -87.55, 46.56]
# center: [-87.635, 46.495]
# zoom: 14
# min_zoom: 10
# max_zoom: 18
# basemap_maxzoom: 15
# terrain_maxzoom: 13

# --- Build-time data gates ---
# Skip the relevant Overpass query / asset generation when false.
# Per-toggle visibility on FIRST visit is controlled by default_visible
# (Display section below), not by these flags.
# show_markers: true
# show_features: true
# show_parking: true
# show_trailheads: true
# show_toilets: true
# show_drinking_water: true
# show_terrain: true
# show_difficulty: false
# show_routes: true
# show_trails: true
# direction_arrows_required: false   # force arrows on, hide the toggle
# poi_proximity_m: 50
# suppress_path_labels: false
# suppress_basemap_pois: false
# show_route_distance: false
# show_route_elevation: false

# --- Per-route style overrides ---
# color_by: relation
# default_trail_color: "#808080"
# dashed_relations: {}
# relation_colors: {}
# default_direction_schedule: {}
# direction_schedules: {}

# --- Display ---
# First-visit visibility for layer toggles. Three forms (see README):
#   omitted / []   → everything off (rider opts in via Options)
#   "all"          → everything on (legacy behaviour)
#   list of names  → only those layers on
# Maps with one-way trails should include "direction_arrows" or use
# "all" so first-visit riders see directional indicators.
# default_visible: []
# default_labels: none           # routes / trails / none
# default_color_scheme: light    # light / dark / auto (auto = OS preference)
# invert_logo_dark: true         # CSS-invert the logo in dark mode
# map_dim_on_highlight: true
# url_hash: false
# distance_units: mi             # mi / km
# share_button: true

# --- Marker + accent colours (per-map branding) ---
# marker_color: "#795548"
# marker_text_color: "white"
# marker_border_color: "white"
# parking_color: "#2980b9"
# parking_text_color: "white"
# parking_border_color: "white"
# trailhead_color: "#27ae60"
# trailhead_text_color: "white"
# trailhead_border_color: "white"
# feature_color: "#8e44ad"
# feature_ring_color: "#ffffff"
# UI accent (active toggle pill, focus ring, link, FAB pressed, etc.).
# Three forms: omitted = framework default (#2980b9); "#FF5733" = hex;
# "auto" = derive from the logo (or icon) at build time, auto-darkens
# for WCAG AA contrast. Build warns when the resolved colour fails
# contrast on either light- or dark-mode sheet background.
# accent_color: "#2980b9"

# --- Base layers (custom raster basemaps) ---
# base_layers: []

# --- Branding ---
# logo: logo.webp
# icon: icon.png

# --- User-supplied points ---
# trailheads: []
# parking: []

# --- PWA ---
# pwa: true
# pwa_install_prompt: true       # show our Install button + Chrome's mini-infobar

# --- About modal ---
# about:
#   description: |
#     Description text.
#   more_information:
#     - label: ""
#       url: ""
#   author:
#     name: ""
#     url: ""
#   extra_links:
#     - label: ""
#       url: ""

# --- Welcome modal (first-visit) ---
# Three forms: omitted (framework default with controls hint +
# attribution footer), `false` (suppress entirely), or dict below.
# welcome:
#   title: ""
#   body: |
#     Plain-text intro. Paragraphs are separated by blank lines.
#   show_controls_hint: true   # default true; set false if `body` already explains the controls

# --- Output ---
# output_dir: build/my-trails
