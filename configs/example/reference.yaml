# reference.yaml: the verbose, fully-annotated reference for every
# supported config key. Keys are in the same canonical order as
# `reference-minimal.yaml` (the terse skeleton), so you can diff the
# two at any time. Most lines are commented out at the framework
# default; uncomment and edit only what you need.
#
# Conventions used in this file:
# - Each key is preceded by a comment block describing what it does,
#   what values it accepts, what the default is, and (when useful)
#   why the default is what it is.
# - Required keys are uncommented with placeholder values.
# - Optional keys are commented out at their default value so you can
#   see the full surface without changing behaviour.
#
# For prose documentation, see `docs/configuration.md`. For real-world
# examples drawn from production trail systems, see `docs/examples.md`.


# ============================================================
# Identity (REQUIRED)
# ============================================================
# Every map needs these three keys plus a non-empty `relations:` list
# (Data sources, below). The build aborts if any are missing.

# Short name used in build logs and as the PWA icon label on mobile
# home screens. Keep it under ~20 characters: long names truncate on
# the launcher.
name: My Trails

# URL-safe identifier. Drives three things at once:
#   1. The map's config folder name on disk: configs/<slug>/
#   2. The build output directory:           build/<slug>/
#   3. The deploy destination subdirectory.
# Must match `[a-z0-9_-]+` AND match the folder name holding the YAML.
# The validator enforces both; mismatched slug and folder name fails
# fast with a clear error.
slug: my-trails

# Full page title shown in the browser tab and the PWA install dialog.
# This is what the OS surfaces when the rider installs the map as an
# app.
title: "My Trails Map"


# ============================================================
# Data sources
# ============================================================
# Where the build pulls trail data from. `relations:` is required and
# must be non-empty; everything else in this section is optional.

# OSM relation IDs to render as routes on this map. The required
# source list:
#
#   - Each entry may be a LEAF route relation OR a SUPER-RELATION.
#     A super-relation (a relation whose members are themselves
#     type=relation entries) is auto-expanded into its child routes
#     one level deep at fetch time; the parent itself is dropped
#     since it has no ways of its own. A super whose member is also
#     a super treats the inner one as a leaf (one level deep only).
#   - Order doesn't matter. Each entry is fetched independently and
#     all results merge into a single route set.
#   - Multi-system maps just list every entry-point relation
#     (e.g. two adjacent super-relations get two list entries).
#   - Find each ID at https://www.openstreetmap.org/relation/<id>.
relations:
  - 12345678

# Path to a local .osm XML file (typically next to the YAML). When set,
# the build skips the Overpass API entirely and reads from this file.
# Useful for offline builds, trail data not yet uploaded to OSM, or
# experiments before pushing edits to OSM.
# osm_file: osm.osm

# OSM relation IDs to include but clip to the core trail bounding box
# (e.g. long rail trails or XC ski trails that pass through the area).
# Clipped routes get continuation arrowheads at every cut endpoint
# pointing in the direction the route keeps going off-map.
# Super-relations are auto-expanded the same way as `relations:`.
# clipped_relations: []

# Relation IDs to flag `winter=true`. Use for winter-only routes not
# already tagged `seasonal=winter` in OSM (snowshoe relations, fatbike
# loops, etc.). Being in this list removes the route from Summer
# unless also in `summer_relations`. Super-relations are accepted and
# fanned out to all child routes. Entries here are auto-fetched even
# if not already covered by `relations:`.
# winter_relations: []

# Relation IDs to flag `summer=true`. The opt-back-in list for
# year-round routes that would otherwise sit only in Winter or
# Emergency. Overlap with `winter_relations` is how you express a
# route that lives in both buckets (e.g. a Snow Bike Route groomed
# for fatbikes in winter AND rideable on knobbies in summer). Entries
# here are auto-fetched even if not already covered by `relations:`.
# summer_relations: []

# Relation IDs to flag `emergency=true`. Rendered only when the
# rider toggles Emergency Access on, regardless of season mode.
# Super-relations are accepted. Entries here are auto-fetched even if
# not already covered by `relations:`.
# emergency_access_relations: []

# Inline-declared non-OSM routes (race courses, event loops, demo
# rides, anything OSM won't accept). Each entry is a small object
# with id / name / color / bucket flags / geometry file reference.
# See docs/configuration.md for the full schema and rules.
# custom_routes: []


# ============================================================
# Map view geometry
# ============================================================
# How the map frames the trails on first paint and how far the rider
# can pan from the trail footprint.

# Bounding box `[west, south, east, north]` used for the INITIAL view
# fit. Auto-computed from trail geometry with a ~3% proportional
# buffer if omitted. The trails will be framed inside this box on
# first paint.
# bbox: [-87.66, 46.47, -87.59, 46.53]

# How much looser the pan wall is than `bbox`, as a fraction of the
# bbox's greater dimension added on each side.
#   0.0   pins the pan wall to bbox (very tight on mobile when zoomed)
#   0.5   default; ~4x the pannable area; comfortable on phones
#   1.0   roughly 9x the pannable area; useful when access roads or
#         parking lots live well outside the trail footprint
# Larger values also expand the basemap + terrain PMTiles extraction
# footprint so tiles fill the whole envelope (~30% size bump at 0.5,
# roughly doubles at 1.0). For per-side asymmetric pan room, use
# `pan_bbox` directly instead.
# pan_padding: 0.5

# Explicit pan envelope `[west, south, east, north]`. Overrides
# `pan_padding` when set. Usually unnecessary: use `pan_padding` unless
# the auto-symmetric expansion is wrong for your site (e.g. you want
# more pan room north than south to cover a parking lot).
# pan_bbox: [-87.70, 46.44, -87.55, 46.56]

# Map centre `[lon, lat]`. Auto-computed from `bbox` midpoint if
# omitted. Set explicitly when you want the camera to land off-centre
# from the trails.
# center: [-87.635, 46.495]

# Initial zoom level. Default `14` is comfortable for most parks.
# zoom: 14

# Minimum zoom level the rider can pan/pinch to.
# min_zoom: 10

# Maximum zoom level the rider can pan/pinch to.
# max_zoom: 18

# Max zoom for basemap tile extraction at build time. Higher values
# give crisper road/label rendering when zoomed in close, at the cost
# of larger PMTiles output.
# basemap_maxzoom: 15

# Max zoom for terrain tile extraction at build time. Terrain tiles
# are used for hillshade rendering, which doesn't need crisp detail at
# the highest zooms; default `13` keeps PMTiles small without visible
# loss.
# terrain_maxzoom: 13


# ============================================================
# Build-time data gates
# ============================================================
# Each `show_*` key gates BOTH the build-time data fetch / asset
# generation AND the runtime UI toggle for that data type. Setting
# false skips the Overpass query (no data fetched, no toggle shown).
# First-visit visibility for layer toggles is controlled separately
# by `default_visible` (Display section below).

# Skip the Overpass query for trail markers (guideposts +
# emergency-access points, merged into one category). Hides the
# Options Markers toggle too.
# show_markers: true

# Skip the Overpass query for `tourism=attraction` feature nodes.
# show_features: true

# Skip rendering YAML-defined parking markers.
# show_parking: true

# Skip rendering YAML-defined trailhead markers.
# show_trailheads: true

# Skip the Overpass query for `amenity=toilets` nodes. The Options
# Toilets toggle auto-hides if the build emitted no toilet features
# (e.g. trail systems where OSM hasn't tagged any).
# show_toilets: true

# Skip the Overpass query for `amenity=drinking_water` nodes. The
# Options Drinking Water toggle auto-hides if the build emitted none.
# show_drinking_water: true

# Skip terrain tile fetching and the hillshade layer. Set false for
# urban / suburban maps where the terrain hillshade adds nothing.
# show_terrain: true

# Generate the IMBA difficulty sprite and enable the in-UI toggle.
# When true, ratings are read from the `mtb:scale:imba` OSM tag on
# individual ways and rendered as ski-trail-style symbols along the
# trail. Defaults off because most maps don't have IMBA-rated trails.
# show_difficulty: false

# Show the Routes section of the Finder and include "Routes" in the
# Labels dropdown. Set false for maps that have no curated route
# relations.
# show_routes: true

# Show the Trails section of the Finder and include "Trails" in the
# Labels dropdown. Useful to set false for systems where routes and
# trails overlap so heavily that listing trails adds noise. If both
# `show_routes` and `show_trails` are false, the whole Finder section
# disappears and the Labels row is hidden.
# show_trails: true

# Force direction arrows to always be visible. The Options toggle row
# is hidden so the rider has no way to disable them. Use for
# safety-critical maps where wrong-way travel on directional flow
# trails would be dangerous. The arrow layer's initial visibility
# skips the `default_visible` and localStorage check entirely while
# this flag is set. If the map has no one-way trails the toggle is
# hidden anyway, so the flag is a no-op there.
# direction_arrows_required: false

# Distance in meters from the nearest visible trail within which a
# feature or trail-marker POI is allowed to render. Tight values
# (~10m) hide POIs that aren't directly on the trail; loose values
# (~75m+) include nearby attractions but risk surfacing
# bbox-incidental POIs.
# poi_proximity_m: 50

# Hide path / track / footway labels from the Protomaps basemap (does
# not affect custom base layers). Useful when basemap path labels
# clutter the trail rendering.
# suppress_path_labels: false

# Hide POI labels (tourism, attractions, viewpoints) from the
# Protomaps basemap. Useful when basemap POI labels clutter the trail
# rendering.
# suppress_basemap_pois: false

# Compute per-route distance at build time (sum of haversine segment
# lengths) and surface it in the Finder rows + highlight chip.
# Cheap; no data dependency. Display units are governed by
# `distance_units` (Display section).
# show_route_distance: false

# Sample elevation along each route via USGS 3DEP at build time and
# compute both positive elevation gain (climb) and absolute negative
# gain (loss / descent) per route. Surfaces in the Finder + highlight
# chip as `arrow-up gain / arrow-down loss`. US-only: routes outside
# US 3DEP coverage will have no elevation stats. See docs/elevation.md
# for the full pipeline, accuracy caveats, and why this won't match
# what your phone or GPS reports.
# show_route_elevation: false


# ============================================================
# Per-route style overrides
# ============================================================
# Override how individual routes (or the whole map) are coloured and
# styled.

# How trail lines are coloured.
#   "relation"   colour by route, sourced from the OSM `colour` tag
#                on each relation; overridable via `relation_colors`.
#   "trail"      colour by per-trail IMBA difficulty rating
#                (`mtb:scale:imba` per way), using the fixed IMBA
#                palette. `relation_colors` does not apply to trail
#                polylines in this mode (only to the route swatch in
#                the finder).
# color_by: relation

# Fallback trail colour. Applies in two cases:
#   - `color_by: relation` mode, when a relation has no OSM `colour`
#     tag.
#   - `color_by: trail` mode, for segments with no `mtb:scale:imba`
#     tag.
# Accepts a CSS colour string OR an object with `color`, `pattern`
# (dash array), and `cap` ("round" or "square") for dashed
# uncoloured trails.
# default_trail_color: "#808080"

# Map of relation ID to dash configuration. Two formats accepted:
#   Simple: `{12345: [4, 2]}` for `[dash, gap]` line-width multiples.
#   Object: `{12345: {pattern: [4, 2], cap: "square",
#                     colors: ["#000", "#f00"]}}` for full control,
#           including alternating-colour dashes.
# See docs/configuration.md for pattern recipes and the
# alternating-colour dashes mechanism.
# dashed_relations: {}

# Map of relation ID to CSS colour. Overrides the OSM `colour` tag
# per route. Accepts hex, named colours, `rgb()`, `rgba()`, `hsl()`.
# Only takes effect on trail polylines when `color_by: relation`
# (the default); under `color_by: trail`, the override is used only
# for the route swatch in the finder.
# relation_colors: {}

# System-wide direction schedule applied to every route:
#   {reverse_days: [day, ...]}
# Day tokens (case-insensitive): the seven weekday names plus two
# parity tokens, `even_days` and `odd_days`, that match calendar-date
# parity. Setting a default schedule is required if any way is tagged
# `oneway=reversible` and isn't covered by a per-relation override
# below; the build fails otherwise.
# default_direction_schedule: {}

# Per-relation direction schedule overrides keyed by relation ID. An
# entry with an empty `reverse_days: []` opts that one route OUT of
# the system-wide default. A super-relation key fans out to every
# child route; an explicit per-child entry always wins over a super.
# direction_schedules: {}


# ============================================================
# Display
# ============================================================
# UI behaviour and first-visit defaults. The rider's choices in the
# Options overlay persist per-map in localStorage and override these
# defaults on subsequent visits.

# First-visit visibility for layer toggles. Three accepted forms:
#   omitted / []   everything off (rider opts in via Options).
#   "all"          every supported layer on (legacy behaviour).
#   list of names  only those layers on.
# Valid layer names: parking, trailheads, features, trail_markers,
# toilets, drinking_water, difficulty, emergency, direction_arrows.
# Maps with one-way trails should normally include `direction_arrows`
# (or use "all"); without it, first-visit riders won't see directional
# indicators. The build prints a warning if one-way trails exist but
# `direction_arrows` is omitted.
# default_visible: []

# Initial label mode for first-visit riders.
#   "routes"   route names printed along the trail
#   "trails"   individual trail names printed along the trail
#   "none"     no labels (default; produces a clean first-paint map)
# The in-UI select reflects `show_routes` / `show_trails`; options for
# hidden categories are removed.
# default_labels: none

# Initial colour scheme for first-visit riders.
#   "light"   force light theme
#   "dark"    force dark theme
#   "auto"    follow the rider's OS `prefers-color-scheme`
# Riders override via the Options Appearance segmented control; their
# choice persists per-map in localStorage. The runtime sets
# <html data-color-scheme> from an inline <head> script that runs
# synchronously BEFORE the stylesheet, so first paint already uses
# the correct scheme (no light-then-dark FOUC). The Protomaps basemap
# uses the matching light or dark flavour automatically. Trail line
# COLOURS are scheme-independent: the map exists to document signed
# trail colours, so changing them per display mode would defeat the
# purpose.
# default_color_scheme: light

# Whether the brand logo (#brand-img) auto-inverts in dark mode via
# CSS `filter: invert(1) hue-rotate(180deg)`. Default true matches
# pre-rebuild behaviour; works well for monochrome and limited-palette
# logos. Set false per-map when the logo is colourful or photographic
# and inverting it produces ugly output (e.g. white backgrounds
# bleeding through inverted to dark grey).
# invert_logo_dark: true

# When a route or trail is highlighted (via Finder tap or in-map
# click), dim every non-highlighted route / trail. Set false to keep
# the rest of the network at full saturation.
# map_dim_on_highlight: true

# Write `#zoom/lat/lon` to the URL hash as the rider pans / zooms,
# and honour any hash on page load. Enables shareable deep-links and
# reload-preserved position. Default false drops the hash entirely:
# return visitors always open framed on `bbox`, URLs stay clean, and
# the last-viewed location doesn't leak via address bar / screenshots
# / screen-shares. See docs/configuration.md (Privacy section) for the
# trade-off.
# url_hash: false

# Units used for ALL distance and elevation values shown in the app:
# off-screen-indicator distance pill, route stats in the Finder
# (gated by `show_route_distance` / `show_route_elevation`),
# highlight chip, etc.
#   "mi"   feet + decimal miles for distance, feet for elevation gain
#   "km"   metres + decimal km for distance, metres for elevation gain
# The mixed elevation convention (feet for `mi`, metres for `km`)
# matches what riders in each unit system actually expect. Underlying
# data is always metres; this only affects render-time formatting.
# distance_units: mi

# Show the "Share this view" action row in the Options overlay.
# Tapping it captures the current view (zoom + center) and any
# highlighted route / trail as a deep-link URL, then surfaces it via
# the Web Share API (mobile native share sheet) or
# `navigator.clipboard.writeText()` (desktop). Recipient opens the
# URL; the runtime restores the view + highlight and strips the hash.
# The shared URL works regardless of `url_hash` (Share is a
# deliberate, consensual one-shot, not ambient URL writing). Set
# false to remove the row entirely (stripped from index.html at build
# time) for private / family maps where the affordance is unwanted.
# Open Graph + Twitter Card meta tags are always emitted (no separate
# gate) so the share preview cards render polished on Android.
# share_button: true


# ============================================================
# Marker and accent colours (per-map branding)
# ============================================================
# Each POI type follows the same three-knob pattern: fill colour,
# glyph / dot colour, halo / ring colour. Values flow to CSS custom
# properties on `:root` so the Options swatch, the on-map marker, and
# any popup badge all read the same hex. One source of truth per
# colour.

# Trail-marker chip fill (merged guideposts + emergency-access
# points).
# marker_color: "#795548"

# Trail-marker glyph (`ref` / `name` / fallback `#`) colour.
# marker_text_color: "white"

# Trail-marker outer halo border colour.
# marker_border_color: "white"

# Parking chip fill.
# parking_color: "#2980b9"

# Parking glyph (`P`) colour.
# parking_text_color: "white"

# Parking outer halo border colour.
# parking_border_color: "white"

# Trailhead chip fill.
# trailhead_color: "#27ae60"

# Trailhead glyph (`TH`) colour.
# trailhead_text_color: "white"

# Trailhead outer halo border colour.
# trailhead_border_color: "white"

# Feature marker inner dot colour.
# feature_color: "#8e44ad"

# Feature marker outer ring colour.
# feature_ring_color: "#ffffff"

# UI accent colour. Drives the active toggle pill, search input focus
# ring, link colour, FAB pressed state, segmented-control active
# fill, and every other accented surface. Three accepted forms:
#   omitted          framework default blue (#2980b9).
#   6-digit hex      "#FF5733" (etc.).
#   "auto"           derive from the logo at build time via Pillow
#                    (picks the most common saturated colour,
#                    auto-darkens for WCAG AA contrast against white
#                    text; cached per-source-hash). SVG-only logos
#                    fall back to the `icon:` raster as the derive
#                    source; if neither is raster, falls back to the
#                    default blue with a warning.
# The build prints a warning when the resolved colour fails WCAG AA
# against either the light-mode or dark-mode sheet background.
# accent_color: "#2980b9"


# ============================================================
# Base layers (custom raster basemaps)
# ============================================================
# Additional raster base layers shown alongside the default Protomaps
# light basemap in the basemap selector. When empty, the basemap
# selector is hidden in the UI; when populated, the selector appears
# with "Default" plus each configured layer.
#
# Each entry is an object:
#   id           Unique identifier (used internally).
#   name         Display name in the basemap dropdown.
#   url          Tile URL template with `{z}`, `{x}`, `{y}`
#                placeholders.
#   attribution  HTML attribution string (optional).
#   tile_size    Tile size in pixels (optional, default 256).
#   max_zoom     Maximum zoom level for the tile source (optional).
#   headers      Map of HTTP headers for authenticated tile requests
#                (optional).
# See docs/configuration.md for examples (USGS topo, satellite, etc.).
# base_layers: []


# ============================================================
# Branding
# ============================================================
# Image assets for the map overlay logo and PWA / favicon icons.
# Asset paths are resolved relative to the config's directory; bare
# filenames like `logo.webp` pick up files sitting next to the YAML.
# See docs/configuration.md (Logo and icon assets) for rendering
# specifics, recommended dimensions, and colour guidance.

# Path to the logo image (any web format Pillow can open: PNG, WebP,
# JPEG). Resampled at build time to fit a 200x80 px box (map overlay)
# and a 140x56 px box (About modal). If omitted, the `icon:` source
# is used as the logo automatically.
# logo: logo.webp

# Path to the source image (PNG / WebP, at least 256 px on the longer
# side) for automatic favicon and PWA-manifest generation. Any aspect
# ratio works: non-square sources are auto-padded to square (centered,
# transparent background). If omitted, the `logo:` source is used as
# the icon source automatically. Most maps only need to set one of
# the two.
# icon: icon.png


# ============================================================
# User-supplied points
# ============================================================
# Trailhead and parking markers declared directly in the config (not
# fetched from OSM). Each entry is a small object; see
# docs/configuration.md for the full schema.

# List of trailhead locations. Each entry needs at least:
#   name          Display name shown in popup.
#   coordinates   `[longitude, latitude]`.
#   directions_url Optional; if omitted, auto-generates a link based
#                  on the rider's browser (Apple Maps in Safari,
#                  Google Maps elsewhere).
# trailheads: []

# List of parking locations. Same schema as trailheads.
# parking: []


# ============================================================
# PWA
# ============================================================
# Progressive Web App support. When enabled, every generated map is a
# fully installable PWA that works offline after first visit.

# Enable PWA support: service worker, offline caching, install row.
# When false, no service worker or install UI is generated. Vendor
# libraries (MapLibre, PMTiles, Protomaps basemap JS) are always
# bundled locally regardless of this setting.
# pwa: true

# Surface PWA install affordances on platforms that support them.
# When true (the default):
#   - On Chrome / Android: the page does NOT call `preventDefault()`
#     on `beforeinstallprompt`, so Chrome's native mini-infobar
#     appears. The custom Install action row in Options is also
#     visible alongside it as a persistent fallback for second-visit
#     installs.
#   - On iOS Safari: the Install action row opens manual
#     Add-to-Home-Screen instructions.
# Set false to suppress install promotion entirely (no
# `beforeinstallprompt` handler is registered, the custom Install row
# is hidden everywhere). Use false for personal or family maps where
# install nagging would be unwanted. Requires `pwa: true`.
# pwa_install_prompt: true


# ============================================================
# About modal
# ============================================================
# Optional content shown in the "About this map" modal opened from
# the Options overlay. The modal always renders Versions and Credits
# sections at the bottom regardless of this block; the keys below add
# rider-facing prose, links, author info, etc. Any subsection whose
# source data is absent is omitted entirely.

# about:
#   description: |
#     Free-form multi-line description shown near the top of the
#     modal. YAML `|` block-literal preserves line breaks.
#   more_information:
#     - label: "Trail Association"
#       url: "https://example.org"
#     - label: "Trail Conditions"
#       url: "https://example.org/conditions"
#   author:
#     name: "Your Name"
#     url: "https://yoursite.example.com"
#   extra_links:
#     - label: "Source on GitHub"
#       url: "https://github.com/you/your-fork"


# ============================================================
# Welcome modal (first-visit)
# ============================================================
# What pops up the first time a rider opens the map. Three accepted
# forms:
#   omitted    framework default (controls hint + attribution footer).
#   false      suppress entirely; no welcome on first visit.
#   dict       custom title / body / show_controls_hint as below.
# Dismissal persists per-map in localStorage.
#
# welcome:
#   title: ""
#   body: |
#     Plain-text intro. Paragraphs are separated by blank lines.
#   show_controls_hint: true   # default true; set false if `body`
#                              # already explains the controls


# ============================================================
# Event mode (optional)
# ============================================================
# Feature one or more routes prominently while every other trail on
# the map renders as muted background context. Use for race courses,
# group rides, demo loops, and any other event-specific map.
#
# Two complementary keys:
#   routes:    Inline route definitions. Each entry has the same
#              shape as a top-level `custom_routes` entry (id, name,
#              color, geometry, and the optional dashed /
#              description / trail_name_field / bucket-flag fields).
#              Inline routes are featured by definition. The geometry
#              path is resolved relative to this YAML's directory.
#   featured:  References to existing routes. Each entry is either a
#              string matching a top-level custom_routes id OR an int
#              matching an OSM relation id present in `relations:`,
#              `clipped_relations:`, or any of the *_relations bucket
#              lists. A super-relation int fans out to every child
#              route as featured.
# At least one of `routes` or `featured` must be non-empty.
#
# `background_style` (optional) defines the styling for every
# non-featured route on the map. Default: dotted gray (color: gray,
# pattern: [0, 2], cap: round).
#
# Curator-supplied `relation_colors` and `dashed_relations` entries
# WIN over background_style for the routes they cover. Use this to
# carve exceptions out of the muted background.
#
# `direction_arrows` (optional bool) flips arrows on along inline
# event routes (event_mode.routes). When true, the curator's race
# course renders with directional arrows AND the rider toggle is
# hidden so they can't be disabled (event-direction is essential
# information for an event map). Featured OSM relations keep their
# normal OSM-tag-driven arrow behaviour.
#
# `pois` (optional list) declares event-only POIs: start / finish,
# aid stations, support areas, etc. Each entry needs a `name` and
# `coordinates` ([lon, lat]); `description` is optional and shows
# in the popup below the name. These markers are ALWAYS visible
# (no rider toggle).
#
# `poi_color` (optional CSS colour) sets the chip background for
# every event POI. Defaults to a saturated red (#D32F2F).
#
# IDs across `event_mode.routes`, top-level `custom_routes`, and
# OSM relations must remain unique (validator enforces).
#
# See docs/event-mode.md for the full guide and worked examples.
# event_mode:
#   routes:
#     - id: race-2026
#       name: "2026 Big Bang 50K"
#       color: "#FF0000"
#       geometry: race-2026.geojson
#   # featured: [12345678]
#   background_style:
#     color: gray
#     pattern: [0, 2]    # dots; or [2, 2] for short dashes, [4, 2] long
#     cap: round
#   direction_arrows: true
