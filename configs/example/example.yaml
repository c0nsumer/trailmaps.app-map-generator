# =============================================================================
# MTB Map Framework — Example Configuration
# =============================================================================
# This file lists every available configuration key with an explanation of
# what it does and the default value the framework will use if the key is
# omitted. It is meant to be read end-to-end the first time you set up a
# map and used as a reference thereafter.
#
# Only `name`, `slug`, `title`, and `root_relation_id` are required.
# Everything else has sensible defaults — leave a key commented out and
# the default applies. Real per-map configs (like configs/ramba/ramba.yaml,
# configs/dte/dte.yaml) follow the same canonical order as this file but
# uncomment ONLY the keys that need a non-default value.
#
# For a copy-paste-ready blank slate, use configs/example/example-minimal.yaml.
#
# Each map lives in its own folder: configs/<slug>/<slug>.yaml plus its
# logo, icon, optional osm.osm snapshot, and optional custom-route
# GeoJSONs. Asset paths in this config are resolved relative to the
# config's directory, so bare filenames like `logo: logo.webp` pick up
# files next to the YAML.
# =============================================================================


# =============================================================================
# Identity
# =============================================================================

# Short name used in build log messages and as the PWA icon label on
# mobile home screens. Keep this brief (e.g., "RAMBA", "Glacial Hills").
name: My Trails

# URL-safe identifier; used as the output directory name (build/<slug>/).
# Must match [a-z0-9_-]+ (lowercase, no spaces).
slug: my-trails

# Full page title shown in the browser tab and as the PWA app name in
# install dialogs.
title: "My Trails Map"

# OSM relation ID anchoring this map. Two valid shapes:
#   - super-relation: its member relations become the routes shown in
#     the trail finder (typical for systems with several named loops).
#   - single route relation: used directly as the only route (typical
#     for small parks where one OSM relation covers everything).
# To find the ID: open openstreetmap.org, search for your park, click
# the trail system in the sidebar, the URL ends with /relation/<id>.
root_relation_id: 12345678


# =============================================================================
# Data sources
# =============================================================================

# Use a local .osm XML file instead of querying the Overpass API. The
# file must contain the root relation, its child relations, and their
# ways with fully-resolved node coordinates (as saved by JOSM). When
# set, all trail and POI data come from this file. The root_relation_id
# above is still required to identify the entry point. Default: unset
# (fetch from Overpass).
# osm_file: osm.osm

# Additional relation IDs to include that are NOT members of the
# super-relation. Useful for connector paths or named segments that have
# their own relations and aren't tagged into the parent. Default: [].
# extra_relations:
#   - 22222222  # Connector Trail

# Relations to include but clip to the bounding box of the core trails.
# Useful for long-distance trails (rail trails, regional XC routes) that
# pass through your area but extend far beyond it. Default: [].
# clipped_relations:
#   - 33333333  # Regional Rail Trail

# Bucket flags. Routes belong to three non-exclusive buckets — Summer,
# Winter, and Emergency. A route can sit in one, two, or all three (e.g.,
# a Snow Bike Route is groomed in winter AND rideable in summer). The
# UI has a Summer/Winter mode switch (one mode at a time) and an
# additive Emergency Access toggle.
#
# Each route's three booleans are computed at build time:
#   winter    = OSM tag seasonal=winter  OR  id in winter_relations
#   emergency = id in emergency_access_relations
#   summer    = id in summer_relations  OR  (not winter AND not emergency)
#
# "Summer is the default" — a plain OSM route with no seasonal tag and
# no inclusion in any of these lists is summer-only.

# winter_relations: relations that should appear in Winter mode but
# aren't tagged seasonal=winter in OSM (e.g., snowshoe-only relations
# that the framework owns rather than OSM). By default, being in
# winter_relations removes a route from Summer; add the same id to
# summer_relations as well for the year-round pattern. Default: [].
# winter_relations:
#   - 11111111  # Snowshoe Loop A

# summer_relations: opt-back-in list for routes that would otherwise be
# pulled out of Summer. Use for year-round routes (OSM seasonal=winter
# but ridden in summer too — the SBR pattern), or emergency routes that
# are also regular summer use. Default: [].
# summer_relations:
#   - 11111111  # Snowshoe Loop A also rideable in summer

# emergency_access_relations: designated emergency / service-vehicle
# routes. Rendered iff the Emergency Access toggle is on, regardless of
# whether the app is in Summer or Winter mode. Default: [].
# emergency_access_relations:
#   - 44444444  # Emergency Service Road

# custom_routes: user-defined non-OSM routes (race courses, event loops,
# demo routes that OSM won't take because they aren't permanent signed
# infrastructure). Each entry references a local GeoJSON file. Custom
# routes participate in buckets, the trail finder, and highlights just
# like OSM routes. Default: [].
#
# Paths are resolved relative to this config file's directory, so a bare
# filename like `race-2025.geojson` picks up the file sitting next to the
# YAML. Drop per-map GeoJSONs into configs/<slug>/ alongside the logo
# and icon.
#
# Geometry must be a FeatureCollection or single Feature with
# LineString or MultiLineString geometry. See README "Custom routes" for
# how to convert GPX, OSM XML, or hand-drawn routes to GeoJSON.
#
# custom_routes:
#   - id: race-2025                       # string, unique within this map
#     name: "2025 Copper Harbor Epic"
#     color: "#ff00ff"
#     summer: true                        # any combination of bucket flags
#     winter: false
#     emergency: false
#     geometry: race-2025.geojson
#     # Optional:
#     # dashed: false                     # render dashed (default false)
#     # description: "Start/finish at the lodge. 20 miles."
#     # trail_name_field: name            # GeoJSON property whose value
#                                         # populates per-feature trail_name
#                                         # so individual segments appear in
#                                         # the trail finder


# =============================================================================
# Per-route style overrides
# =============================================================================

# How trail lines are coloured.
#   relation   - each route gets its colour from the OSM colour= tag
#   difficulty - trails coloured by IMBA difficulty (mtb:scale:imba)
# Default: relation
# color_by: relation

# Default trail colour used when a trail has no colour source.
# Simple form (solid colour):
# default_trail_color: "#808080"
# Object form (dashed line):
# default_trail_color:
#   color: "#808080"
#   pattern: [4, 4]       # [dash_length, gap_length] in line widths
#   cap: round            # round (default) or square
# Default: "#808080"

# Render specific OSM relations with dashed lines instead of solid.
# Dashed routes render centred (no parallel offset) so the dash pattern
# isn't distorted. Common patterns: [0,2]=dots, [2,2]=short, [4,2]=long.
# Object form supports cap (round / square / butt) and a 2-colour
# alternating pattern. Default: {} (all relations solid).
# dashed_relations:
#   55555555: [4, 2]               # simple long dashes
#   66666666:                      # detailed: alternating colours
#     pattern: [4, 2]
#     cap: square
#     colors: ["#000000", "#FF0000"]

# Override OSM colour= tag for specific relations. Accepts hex, named
# CSS colours, rgb()/rgba(), hsl(). Default: {} (use OSM colour= tags).
# relation_colors:
#   55555555: "#999999"
#   66666666: "olive"

# Day-of-week direction schedules for trails signed as one-way with
# direction alternating by day. OSM has no canonical schema for the
# schedule itself, so the framework supplies it via two layered keys.
#
# Tokens are case-insensitive and accept short forms (mon, tue, ...).
# Two extra tokens — even_days, odd_days — match the calendar date's
# parity (getDate()%2). Mixing weekdays and parity is fine.
#
# default_direction_schedule applies system-wide. Use this when the whole
# trail system shares one schedule (the common case). Default: unset.
# default_direction_schedule:
#   reverse_days: [tuesday, thursday, saturday]

# direction_schedules holds per-relation overrides keyed by OSM relation
# ID. An entry here always wins over the default; an entry with empty
# reverse_days opts that route out of the default. Default: {}.
# direction_schedules:
#   12345678:
#     reverse_days: [sunday]              # this route uses a different schedule
#   87654321:
#     reverse_days: []                    # this route opts out entirely
#   11223344:
#     reverse_days: [even_days]           # parity-based; OSM direction on odd days
#
# REQUIRED for any way tagged oneway=reversible to render at all — the
# build fails if a reversible way is not covered by some schedule. For
# oneway=yes / -1 ways the schedule is optional; without one the OSM
# direction is used statically.


# =============================================================================
# Marker colours
# =============================================================================
# Per-system branding for the small POI markers. Trail colours are
# unaffected by these — they come from OSM colour= or relation_colors.

# Trail-marker background (`color`), glyph (`text_color`), and
# outer halo (`border_color`). Trail markers merge OSM guideposts
# and emergency-access points into one category — they render
# identically on the map. Defaults: brown chip, white text, white
# halo. Each value is wired to the matching CSS custom property
# (--marker-color / --marker-text-color / --marker-border-color)
# so the peek-bar swatch and the on-map marker stay in lockstep.
# marker_color:        "#795548"
# marker_text_color:   "white"
# marker_border_color: "white"

# Parking / Trailhead marker fills, glyph colours, and halo
# borders. Same pattern as marker_*: background, text, and border
# are three independent knobs. Override border_color to tint the
# halo (e.g. a dark halo to pop against snow-covered basemaps).
# parking_color:          "#2980b9"
# parking_text_color:     "white"
# parking_border_color:   "white"
# trailhead_color:        "#27ae60"
# trailhead_text_color:   "white"
# trailhead_border_color: "white"

# Feature marker fill (the inner 12 px dot) and ring (the 2 px
# outer circle around that dot). Defaults produce a purple dot on
# a white ring; override either to colour-match a trail system's
# branding without touching CSS. The drop shadow stays as-is.
# feature_color:      "#8e44ad"
# feature_ring_color: "#ffffff"


# =============================================================================
# View geometry
# =============================================================================

# Bounding box [west, south, east, north] in decimal degrees. If
# omitted, auto-computed from trail geometry with a proportional buffer.
# bbox: [-87.66, 46.47, -87.59, 46.53]

# Pan envelope. `bbox` frames the trails for the INITIAL view;
# `pan_padding` controls how much room the user has to pan BEYOND the
# trails before hitting the wall. Expressed as a fraction of the bbox
# extent: 0.5 (default) adds 50% of extent per side ≈ 4x the pannable
# area, 0 disables expansion entirely. The basemap and terrain PMTiles
# extraction also expands to match so tiles fill the whole envelope.
# For full manual control, set `pan_bbox: [w, s, e, n]` directly; when
# present it overrides `pan_padding`.
# pan_padding: 0.5
# pan_bbox: [-87.70, 46.44, -87.55, 46.56]

# Default map centre [longitude, latitude]. If omitted, auto-computed
# from the bbox midpoint.
# center: [-87.635, 46.495]

# Zoom limits and basemap detail.
# Defaults: zoom=14, min_zoom=10, max_zoom=18, basemap_maxzoom=15.
# zoom: 14
# min_zoom: 10
# max_zoom: 18
# basemap_maxzoom: 15

# Maximum zoom for terrain tile extraction. Higher = sharper hillshade
# at high zoom but a larger terrain.pmtiles. Default: 13.
# terrain_maxzoom: 13


# =============================================================================
# PWA
# =============================================================================

# Enable Progressive Web App support: bundles vendor libraries locally,
# generates a service worker for offline use, and surfaces an Install
# As App row in the bottom sheet (when the browser supports installation).
# When false, vendor libraries are still bundled but no service worker
# or install UI is generated. Default: true.
# pwa: true


# =============================================================================
# Build-time data gates
# =============================================================================
# These flags gate *data fetching / asset generation* at build time —
# not the runtime UI. Disabling skips the relevant Overpass query (or
# IMBA difficulty sprite generation) entirely. Per-toggle UI defaults
# now persist in the user's browser localStorage and are not
# configurable here.

# Show trail-marker POIs — the merged category covering OSM guideposts
# (tourism=information + information=guidepost) AND emergency access
# points (highway=emergency_access_point). Default: true.
# show_markers: true

# Show parking markers (from the `parking` list below). Default: true.
# show_parking: true

# Show trailhead markers (from the `trailheads` list below).
# Default: true.
# show_trailheads: true

# Show feature markers (OSM tourism=attraction nodes inside the bbox).
# Default: true.
# show_features: true

# Distance (meters) from the nearest visible trail within which a
# feature or trail-marker POI is allowed to render. Tight values
# (~10 m) hide POIs that aren't directly on the trail; loose values
# (~75 m+) include nearby attractions but risk surfacing
# bbox-incidental POIs. Default 50 m surfaces typical
# `tourism=attraction` features (often 10-50 m off the centerline)
# while keeping the filter useful. The Features peek toggle
# auto-hides if no feature POI passes this distance check.
# poi_proximity_m: 50

# Generate terrain.pmtiles for hillshade overlay. Set false for flat
# areas or to reduce build size. Default: true.
# show_terrain: true

# Build IMBA difficulty icon sprite. When true (and the OSM data has
# mtb:scale:imba tags), the bottom-sheet Difficulty toggle is available
# and starts ON for first-time visitors (state then persists in
# localStorage). Default: false.
# show_difficulty: false

# Show the Routes section in the Finder and the "Routes" option in the
# Labels dropdown. Set false for trail-only systems with no curated
# routes. Default: true.
# show_routes: true

# Show the Trails section in the Finder and the "Trails" option in the
# Labels dropdown. Default: true.
# show_trails: true

# Suppress path / track / footway labels from the Protomaps basemap so
# basemap text doesn't compete with trail casings. Doesn't affect minor
# road labels or custom raster base layers. Default: false.
# suppress_path_labels: false

# Suppress Protomaps basemap POI labels (tourism, attractions, viewpoints).
# Default: false.
# suppress_basemap_pois: false


# =============================================================================
# Display
# =============================================================================

# First-visit visibility for the layer toggles in Options. Three forms:
#
#   omitted / []   — everything off; the rider opts into each layer
#                    via the Options drawer. Recommended starting point
#                    for a clean map.
#   "all"          — everything on (the legacy framework behavior).
#                    One-line opt-in for maps that want every annotation
#                    visible by default.
#   list of names  — only the listed layers default to ON. All others
#                    default to OFF.
#
# Valid layer names:
#   parking, trailheads, features, trail_markers,
#   toilets, drinking_water, difficulty, emergency, direction_arrows
#
# Once the rider toggles a layer in Options, their preference persists
# in localStorage and overrides the default on subsequent visits.
#
# Safety note: maps with one-way trails should normally include
# "direction_arrows" (or use "all") — without it, first-visit riders
# won't see directional indicators on flow trails. The build emits a
# warning if oneway segments exist but direction_arrows is omitted.
# default_visible:
#   - parking
#   - trailheads
#   - direction_arrows

# Initial label mode for first-visit riders: routes (one label per
# route), trails (one label per named trail), or none. The Labels
# segmented control always offers all three; this just sets the
# starting choice. Defaults to "none" so a fresh-LS visit produces
# a clean map; set "routes" or "trails" to put labels on by default.
# default_labels: none

# When true, highlighting a route or trail dims the rest of the map —
# basemap gets a dark tint, non-highlighted labels/arrows/difficulty are
# hidden, and POI markers fade — so the highlighted feature reads as a
# spotlight. Set false to keep every route at full brightness behind the
# highlight ribbon; the highlight still pops via its amber stroke +
# dark outline. Default: true.
# map_dim_on_highlight: true

# Write `#zoom/lat/lon` to the URL hash as the user pans/zooms, and
# restore that position on reload. Enables "share this view" links and
# reload-preserves-position, at the cost of leaking the last-viewed
# location in the address bar, screenshots, and screen-shares. Set
# true to opt in to the hash and shareable deep-links — on return
# visits the map opens framed on the hash position instead of `bbox`.
# Default: false.
# url_hash: false


# =============================================================================
# Base layers
# =============================================================================
# Additional raster tile layers selectable from the bottom sheet's
# Basemap section. The Basemap selector is HIDDEN when this list is
# empty; it appears only when at least one custom layer is configured.
# Each entry needs id (unique), name (display), url (with {z}/{x}/{y});
# optional attribution, tile_size (default 256), max_zoom, and
# headers (for authenticated tile services).
#
# base_layers:
#   - id: usgs-topo
#     name: "USGS Topo"
#     url: "https://basemap.nationalmap.gov/arcgis/rest/services/USGSTopo/MapServer/tile/{z}/{y}/{x}"
#     attribution: "&copy; USGS"
#   - id: esri-satellite
#     name: "Satellite"
#     url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
#     attribution: "&copy; Esri, Maxar, Earthstar Geographics"
#     max_zoom: 19


# =============================================================================
# Branding
# =============================================================================

# Logo shown in the bottom-left corner of the map. Any web image format
# (PNG / WebP / SVG). Resampled to fit a 200×80 box on desktop, kept
# vector if SVG. Path is resolved relative to this config's directory —
# by convention, drop the file next to this YAML as logo.<ext>.
# logo: logo.webp

# Single square source image used to generate every favicon variant and
# PWA icon at build time (apple-touch-icon, android-chrome icons,
# favicon.ico, Safari pinned tab SVG, web manifest). PNG or WebP, ≥ 256 px
# square. Path is resolved relative to this config's directory — by
# convention, drop it next to this YAML as icon.<ext>.
# icon: icon.png


# =============================================================================
# User-supplied points
# =============================================================================

# Trailhead locations rendered as green TH markers with a "Get directions"
# popup. Optional `directions_url` overrides the default platform
# (Apple Maps in Safari, Google Maps elsewhere) link. Default: [].
# trailheads:
#   - name: "Main Trailhead"
#     coordinates: [-87.640399, 46.4916581]
#   - name: "North Trailhead"
#     coordinates: [-87.635000, 46.500000]
#     directions_url: "https://maps.app.goo.gl/example"
#
# Tip: if a trailhead has parking, prefer one trailhead entry (with a
# directions_url if needed) over duplicating the same coordinates as
# both a trailhead and a parking entry — overlapping markers crowd the
# map. Reserve `parking` for lots that aren't co-located with a
# trailhead.

# Parking locations rendered as blue P markers. Same shape as trailheads.
# Default: [].
# parking:
#   - name: "Main Parking Lot"
#     coordinates: [-87.640399, 46.4916581]
#   - name: "South Lot"
#     coordinates: [-87.635000, 46.488000]


# =============================================================================
# About
# =============================================================================
# Content shown in the About modal (opened from the Options overlay).
# Build date, data freshness, and standard data-source credits (OSM,
# Protomaps, Mapterhorn, USGS 3DEP, MDI, MapLibre, OFL fonts) are always
# shown; the fields below add map-specific content on top. Entire block
# is optional.
#
# about:
#   description: |
#     The My Trails Map is an unofficial guide to the My Trails network.
#     Built from OpenStreetMap data.
#
#   more_information:
#     - label: "My Trails Association"
#       url: "https://mytrails.example.org"
#     - label: "Trail Conditions"
#       url: "https://mytrails.example.org/conditions"
#
#   author:
#     name: "Your Name"
#     url: "https://yoursite.example.com"
#
#   extra_links:
#     - label: "Source on GitHub"
#       url: "https://github.com/you/your-fork"


# =============================================================================
# Welcome modal (first-visit overlay)
# =============================================================================
# Shown the first time a rider visits this map in their browser; dismissal
# persists in localStorage as `<slug>.mtb.welcomed` so subsequent visits
# skip it.
#
# Three forms accepted:
#   omitted    — framework default: a controls hint (Search / Options /
#                Locate, with their on-map icons) plus a sober attribution
#                footer. Recommended for most maps.
#   false      — suppress the welcome modal entirely. Useful for embeds
#                or maps where a first-visit overlay would be intrusive.
#   dict       — see below; all sub-keys optional.
#
# When the dict form is used:
#   title              — overrides the default "Welcome to {map title}"
#   body               — plain-text intro shown above the controls hint.
#                        Paragraphs are separated by blank lines.
#   show_controls_hint — true (default) shows the Search/Options/Locate
#                        cheat sheet under your body. Set false if your
#                        body already explains the controls.
#
# welcome:
#   title: "Welcome to the My Trails Map"
#   body: |
#     This unofficial map covers the My Trails network in lower Michigan.
#     Trail conditions are updated weekly by the maintenance crew.
#
#     Please respect closures and pack out what you bring in.
#   show_controls_hint: true


# =============================================================================
# Output
# =============================================================================

# Where the build pipeline writes the deployable site. Default:
# build/<slug>/. Override to write directly into a server's web root.
# output_dir: build/my-trails
