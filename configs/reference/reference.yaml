# Annotated reference: every supported key in canonical order, with a one-line
# note on each. This file is for quick in-editor lookup; docs/configuration.md
# is the full reference (accepted values, defaults, gotchas, and deep dives).
# To start a new map, copy reference-minimal.yaml instead.

# ============================================================
# Identity
# ============================================================

# Short name; used in build logs and as the PWA home-screen label.
name: My Trails

# URL-safe id ([a-z0-9_-]+); names the config folder, build dir, and deploy
# path. Must match the folder holding this YAML.
slug: my-trails

# Full page title (browser tab, PWA install dialog).
title: "My Trails Map"

# ============================================================
# Data sources
# ============================================================

# OSM relation IDs to render as routes. Each may be a leaf route relation or a
# super-relation (expanded to its child routes one level deep).
relations:
  - 12345678

# Build from a local .osm XML file instead of Overpass (config-folder-relative).
# osm_file: osm.osm

# Relations to include but clip to the core trail bounding box (e.g. rail trails).
# clipped_relations: []

# Feature one or more routes prominently; every other trail renders muted.
# Full schema and examples in docs/event-mode.md.
# event_mode:
#   routes: []                       # inline featured routes (custom_routes entry shape)
#   featured: []                     # feature existing custom_routes ids / OSM relation ids
#   direction_arrows: false          # always-on arrows along inline routes
#   pois: []                         # always-on event POIs ({name, coordinates, description})
#   gpx:                             # downloadable GPX files (FAB + download sheet)
#     routes:
#     - name: Long Course            # display label in the download sheet
#       file: long_course.gpx        # .gpx next to this YAML; filename preserved on download

# ============================================================
# Route buckets
# ============================================================
#
# Each list accepts leaf route IDs or super-relation IDs (which fan out to
# their children). See docs/configuration.md for how the flags combine.

# Flag winter=true (removes the route from Summer unless also in summer_relations).
# winter_relations: []

# Flag summer=true (re-adds a year-round route to Summer).
# summer_relations: []

# Flag emergency=true (shown only when the rider enables the Emergency overlay).
# emergency_access_relations: []

# ============================================================
# Custom routes
# ============================================================

# Non-OSM routes defined inline with a GeoJSON geometry file. See
# docs/configuration.md (Custom routes) for the entry schema.
# custom_routes: []

# ============================================================
# Map view geometry
# ============================================================

# Initial view fit [west, south, east, north]; auto-computed from trails if omitted.
# bbox: [-87.66, 46.47, -87.59, 46.53]

# Explicit pan wall [west, south, east, north]; overrides pan_padding when set.
# pan_bbox: [-87.70, 46.44, -87.55, 46.56]

# Pan-wall slack beyond bbox, as a fraction of the greater dimension. 0.5 ~ 4x
# pannable area; 0 pins the wall to bbox. Also widens tile extraction.
# pan_padding: 0.5

# Map centre [lon, lat]; auto-computed from the bbox midpoint if omitted.
# center: [-87.635, 46.495]

# Initial zoom level.
# zoom: 14

# Minimum zoom level.
# min_zoom: 10

# Maximum zoom level.
# max_zoom: 18

# Max zoom for basemap tile extraction.
# basemap_maxzoom: 15

# Max zoom for terrain tile extraction.
# terrain_maxzoom: 13

# ============================================================
# Build-time data gates
# ============================================================
#
# These gate data fetching and asset generation, not UI visibility. The
# matching toggle auto-hides when the underlying data or sprite is absent.

# Fetch trail markers (guideposts + emergency-access points, merged).
# show_markers: true

# Fetch tourism=attraction feature nodes.
# show_features: true

# Render parking markers supplied in the config.
# show_parking: true

# Render trailhead markers supplied in the config.
# show_trailheads: true

# Render trail-hub markers supplied in the config.
# show_hubs: true

# Fetch amenity=toilets nodes.
# show_toilets: true

# Fetch amenity=drinking_water nodes.
# show_drinking_water: true

# Fetch terrain tiles and render the hillshade layer.
# show_terrain: true

# Generate IMBA difficulty symbols; auto-hidden if no way carries mtb:scale:imba.
# show_difficulty: true

# Show the Finder's Routes section and the Routes label mode.
# show_routes: true

# Show the Finder's Trails section and the Trails label mode.
# show_trails: true

# Allow direction arrows on oneway ways. false suppresses them outright and
# overrides forced_visible.
# show_direction_arrows: true

# Hide path / track / footway labels from the Protomaps basemap.
# suppress_basemap_path_labels: false

# Hide POI and place=locality labels from the Protomaps basemap.
# suppress_basemap_pois: false

# Hide the Protomaps basemap's oneway direction arrows (roads + paths).
# suppress_basemap_oneway_arrows: false

# Compute per-route distance at build time; show it in the Finder + chip.
# show_route_distance: false

# Sample USGS 3DEP for per-route gain / loss (US only). See docs/elevation.md.
# show_route_elevation: false

# Max distance (m) from a visible trail for a feature / marker POI to render.
# poi_proximity_m: 50

# ============================================================
# Per-route style overrides
# ============================================================

# Map of relation ID to CSS colour; overrides the OSM colour tag.
# relation_colors: {}

# Map of relation ID to dash config. See docs/configuration.md (Dash patterns).
# dashed_relations: {}

# Trail line colouring: "relation" (route colour) or "trail" (per-way IMBA palette).
# color_by: relation

# Fallback trail colour, or an object with color / pattern / cap for dashed
# uncoloured trails.
# default_trail_color: "#808080"

# ============================================================
# Direction schedules
# ============================================================

# Day-of-week / date-parity arrow reversal. Required for any oneway=reversible
# way. See docs/configuration.md (Direction schedules).
# direction_schedule: {}

# ============================================================
# Display
# ============================================================

# First-visit layers ON. [] = all off, "all" = all on, or a list of layer names.
# default_visible: []

# Layers forced ON with their toggle hidden. Same forms as default_visible.
# forced_visible: []

# First-visit label mode: "routes", "trails", or "none".
# default_labels: none

# Lock the label mode and hide the Labels control: "routes", "trails", or "none".
# forced_labels: trails

# First-visit colour scheme: "light", "dark", or "auto" (follows the OS).
# default_color_scheme: light

# Auto-invert the logo in dark mode. Set false for colourful / photographic logos.
# invert_logo_dark: true

# Dim non-highlighted routes / trails when one is highlighted.
# map_dim_on_highlight: true

# Scrim opacity (0..1) shared by the in-map highlight wash AND the
# Search / Options / About menu backdrops; lower keeps connecting trails
# legible for wayfinding, higher is a stronger dim. Default 0.40.
# scrim_opacity: 0.40

# Soft amber selection glow beneath the highlighted ribbon (helps dark
# routes read as selected). Set false for no glow.
# highlight_glow: true

# Write #zoom/lat/lon to the URL hash as the rider moves and restore it on load.
# url_hash: false

# Units for all distance / elevation values: "mi" or "km".
# distance_units: mi

# Show the "Share this view" row in the Options overlay.
# share_button: true

# What the bottom-right corner control is: the routes panel or the plain
# search button. The routes panel is a key card listing each visible route as
# a colour swatch + name + stats (tap a row to highlight it), with a Search
# button pinned at the bottom that opens the full finder; the search button
# alone is a round magnifier button opening the same finder. Search is always
# reachable either way. "Listable" routes follow the rider's season /
# emergency toggles, and event maps list featured routes only.
#   auto (default) — routes panel when the map has 2+ listable routes
#                    (expanded at 2-5, collapsed to a round list-icon button
#                    at 6+; the rider's expand/collapse choice persists per
#                    map and beats this default), search button otherwise.
#   routes         — routes panel, starting expanded regardless of count.
#   search         — search button only; no key rows.
# panel_mode: auto

# ============================================================
# Marker and accent colours
# ============================================================
#
# Each POI type takes three colours: chip fill, glyph, and halo.

# Trail-marker chip fill (merged guideposts + emergency-access points).
# marker_color: "#795548"

# Trail-marker glyph colour.
# marker_text_color: "white"

# Trail-marker halo colour.
# marker_border_color: "white"

# Parking chip fill.
# parking_color: "#2980b9"

# Parking glyph (P) colour.
# parking_text_color: "white"

# Parking halo colour.
# parking_border_color: "white"

# Trailhead chip fill.
# trailhead_color: "#27ae60"

# Trailhead glyph (TH) colour.
# trailhead_text_color: "white"

# Trailhead halo colour.
# trailhead_border_color: "white"

# Trail-hub chip fill (hexagonal H chip with an inline name label).
# hub_color: "#f39c12"

# Trail-hub glyph (H) colour.
# hub_text_color: "white"

# Trail-hub halo colour (a drop-shadow halo that follows the hex silhouette).
# hub_border_color: "white"

# Feature marker inner dot colour.
# feature_color: "#8e44ad"

# Feature marker outer ring colour.
# feature_ring_color: "#ffffff"

# UI accent: a 6-digit hex or "auto" (logo-derived); resolves to a per-mode
# light / dark palette.
# accent_color: "#1D6FA5"

# ============================================================
# Base layers
# ============================================================

# Additional raster base layers in the basemap selector. See
# docs/configuration.md (Base layers).
# base_layers: []

# ============================================================
# Branding
# ============================================================

# Logo image (config-folder-relative, any web format). Falls back to icon: if omitted.
# logo: logo.webp

# Source image for favicons + PWA icons (PNG / WebP, 256 px+). If omitted, the
# logo image is reused as the icon source, so most maps set only one of the two.
# icon: icon.png

# If you set NEITHER logo: nor icon:, the engine falls back to its bundled
# placeholder (a bicycle on the brand green, assets/placeholder-logo.png) so the
# map still gets favicons, an installable PWA icon, and an on-page brand mark.

# Additional logos (config-folder-relative). Secondary brand images — e.g. an
# event logo plus one or more sponsor logos — stacked vertically UNDER the
# primary logo: in the top-left brand mark. Rendered top-to-bottom in the order
# listed, a touch smaller than the primary. These are DISPLAY-ONLY: the primary
# logo: still drives favicon / PWA icon generation, accent_color auto-derivation,
# the About-modal image, and the social-share (og:image), so icon output is
# unchanged no matter how many logos you add here. Like the primary logo they sit
# in a click-through overlay — taps pass through to the map underneath. Each entry:
#   - path:        (required) image file, raster or SVG, same pipeline as logo:
#   - invert_dark: (optional, default true) auto-invert in dark mode; set false
#                  for colored / photographic sponsor logos that look wrong inverted.
# additional_logos:
#   - path: event-logo.svg
#   - path: sponsor-acme.webp
#     invert_dark: false

# ============================================================
# User-supplied points
# ============================================================

# Trailhead points: name + coordinates [lon, lat] (+ optional directions_url).
# trailheads: []

# Parking points: name + coordinates [lon, lat] (+ optional directions_url).
# parking: []

# Trail-hub points (named on-trail intersections): name + coordinates [lon, lat].
# hubs: []

# ============================================================
# PWA
# ============================================================

# Enable the service worker, offline caching, and the install row.
# pwa: true

# Surface install affordances; false suppresses install promotion. Requires pwa: true.
# pwa_install_prompt: true

# ============================================================
# About modal
# ============================================================

# Optional description / curator / links shown in the About modal.
# about:
#   description: |
#     Description text.
#   curator:
#     name: ""
#     url: ""
#   links:
#     - label: ""
#       url: ""

# ============================================================
# Welcome modal
# ============================================================

# First-visit modal. Omit for the default hint, false to suppress, or a dict
# with optional title / body / show_controls_hint.
# welcome:
#   title: ""
#   body: |
#     Plain-text intro. Paragraphs are separated by blank lines.
#   show_controls_hint: true

# ============================================================
# Output
# ============================================================

# Custom build output directory.
# output_dir: build/my-trails
